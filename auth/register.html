<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create your SmartJob account and accelerate your career.">
    <title>Create Account | SmartJob Nepal</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <style>
        body {
            background: linear-gradient(135deg, var(--bg-deep) 0%, #f1f5f9 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        [data-theme="dark"] body {
            background: linear-gradient(135deg, var(--bg-deep) 0%, #0b0f19 100%);
        }
        .auth-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 120px 20px 60px;
        }
    </style>
</head>
<body>

<header class="global-nav"></header>

<div class="auth-wrapper">
    <div class="form-box animate-in" style="max-width: 480px;">
        <div style="margin-bottom: 32px;">
            <div style="font-size: 32px; font-weight: 950; letter-spacing: -2px; color: var(--text-main); margin-bottom: 8px;">
                Smart<span style="color: var(--primary);">Job</span>
            </div>
            <h2 style="font-size: 24px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 6px;">Create Your Account</h2>
            <p style="color: var(--text-muted); font-size: 14px; font-weight: 500;">Join thousands of Nepali professionals building the future.</p>
        </div>

        <div id="alert-box"></div>

        <!-- Step 1: Registration Form -->
        <div id="step-register">
            <form onsubmit="handleSendOtp(event)">
                <div class="input-group">
                    <label for="name"><i class="far fa-user" style="margin-right: 6px; color: var(--text-dim);"></i> Full Name</label>
                    <input type="text" id="name" placeholder="Your full name" required>
                </div>
                <div class="input-group">
                    <label for="email"><i class="far fa-envelope" style="margin-right: 6px; color: var(--text-dim);"></i> Email Address</label>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>
                <div class="input-group">
                    <label for="password"><i class="far fa-lock" style="margin-right: 6px; color: var(--text-dim);"></i> Password</label>
                    <input type="password" id="password" placeholder="Min 6 characters" required minlength="6">
                </div>
                <div class="input-group">
                    <label for="confirm-password"><i class="far fa-shield-check" style="margin-right: 6px; color: var(--text-dim);"></i> Confirm Password</label>
                    <input type="password" id="confirm-password" placeholder="Re-enter password" required>
                </div>
                <div class="input-group" style="margin-bottom: 24px;">
                    <label for="role"><i class="far fa-user-tag" style="margin-right: 6px; color: var(--text-dim);"></i> I am a...</label>
                    <select id="role">
                        <option value="seeker">Job Seeker</option>
                        <option value="employer">Employer</option>
                    </select>
                </div>
                <button type="submit" id="register-btn" class="btn btn-primary" style="width: 100%; padding: 14px; font-size: 15px; border-radius: var(--radius);">
                    Send Verification Code <i class="fas fa-paper-plane" style="margin-left: 8px;"></i>
                </button>
            </form>
        </div>

        <!-- Step 2: OTP Verification -->
        <div id="step-otp" style="display:none;">
            <p style="color: var(--text-muted); font-size: 14px; font-weight: 600; margin-bottom: 24px; line-height: 1.6;">
                A 6-digit verification code has been sent to your email. Enter it below to unlock your workspace.
            </p>
            <form onsubmit="handleVerifyOtp(event)">
                <div class="input-group" style="margin-bottom: 24px;">
                    <label for="otp" style="text-align: center; display: block;"><i class="far fa-key" style="margin-right: 6px; color: var(--text-dim);"></i> Verification Code (OTP)</label>
                    <input type="text" id="otp" placeholder="••••••" maxlength="6"
                           style="font-size: 28px; letter-spacing: 12px; text-align: center; font-weight: 800;" required>
                </div>
                <button type="submit" id="verify-btn" class="btn btn-primary" style="width: 100%; padding: 14px; font-size: 15px; border-radius: var(--radius); margin-bottom: 12px;">
                    Verify & Create Account <i class="fas fa-circle-check" style="margin-left: 8px;"></i>
                </button>
            </form>
            <div style="margin-bottom: 12px;">
                <button id="resend-btn" onclick="handleResendOtp(event)" class="btn btn-glass" style="width: 100%; padding: 12px; font-size: 14px; border-radius: var(--radius); justify-content: center; width: 100%;" disabled>
                    <i class="fas fa-rotate-right" style="margin-right: 8px;"></i> Resend Code <span id="cooldown-timer">(30s)</span>
                </button>
            </div>
            <button onclick="toggleSteps('register')" class="btn btn-glass" style="width: 100%; padding: 12px; font-size: 14px; border-radius: var(--radius); justify-content: center; width: 100%;">
                <i class="fas fa-arrow-left" style="margin-right: 8px;"></i> Go Back
            </button>
        </div>

        <div style="margin-top: 28px; font-size: 14px; font-weight: 600; color: var(--text-muted);">
            Already have an account? <a href="login.html" style="color: var(--primary); transition: 0.2s;">Sign In here</a>
        </div>
    </div>
</div>

<footer class="premium-footer" style="padding: 40px 0; margin-top: auto; background: transparent; border-top: 1px solid var(--border);">
    <div class="container" style="text-align: center; color: var(--text-dim); font-size: 13px; font-weight: 600;">
        <p>&copy; 2026 SmartJob Nepal. All rights reserved.</p>
    </div>
</footer>

<script src="../assets/js/main.js"></script>
<script src="../assets/js/auth.js"></script>
<script>
    function toggleSteps(step) {
        const reg = document.getElementById('step-register');
        const otp = document.getElementById('step-otp');
        if (step === 'otp') {
            reg.style.display = 'none';
            otp.style.display = 'block';
        } else {
            reg.style.display = 'block';
            otp.style.display = 'none';
        }
    }
</script>
</body>
</html>
