<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - JSTACK</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

<header class="navbar">
    <h2>JSTACK</h2>
    <a href="login.html" style="color:white; text-decoration:none; font-size:14px;">← Back to Login</a>
</header>

<div class="form-container">
    <div class="form-box" style="max-width:400px; margin:50px auto;">
        <h2 style="margin-bottom:10px;">Reset Password</h2>

        <div id="alert-box"></div>

        
        <div id="step-request">
            <p style="color:#666; font-size:14px; margin-bottom:20px; line-height:1.5;">
                Enter your registered email address. We'll send you a 6-digit code to reset your password.
            </p>

            <form onsubmit="event.preventDefault(); handleForgotPasswordRequest();">
                <div class="input-group" style="margin-bottom:15px;">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email"
                           placeholder="you@example.com"
                           required autocomplete="email">
                </div>

                <button type="submit" id="send-otp-btn" class="btn-primary"
                        style="width:100%; padding:12px; cursor:pointer;">
                    Send Reset Code
                </button>
            </form>
        </div>

        
        <div id="step-reset" style="display:none;">
            <p style="color:#666; font-size:14px; margin-bottom:20px; line-height:1.5;">
                Enter the 6-digit code sent to your email and choose a new password.
            </p>

            <form onsubmit="event.preventDefault(); handleResetPassword();">
                <div class="input-group" style="margin-bottom:15px;">
                    <label for="otp">Verification Code</label>
                    <input type="text" id="otp" name="otp"
                           placeholder="6-digit code"
                           required maxlength="6"
                           inputmode="numeric" pattern="[0-9]{6}"
                           autocomplete="one-time-code"
                           style="text-align:center; letter-spacing:5px; font-weight:bold;">
                </div>

                <div class="input-group" style="margin-bottom:15px;">
                    <label for="new-password">New Password</label>
                    <input type="password" id="new-password" name="new_password"
                           placeholder="Minimum 6 characters"
                           required minlength="6"
                           autocomplete="new-password">
                </div>

                <div class="input-group" style="margin-bottom:20px;">
                    <label for="confirm-password">Confirm New Password</label>
                    <input type="password" id="confirm-password" name="confirm_password"
                           placeholder="Re-enter new password"
                           required autocomplete="new-password">
                </div>

                <button type="submit" id="reset-btn" class="btn-primary"
                        style="width:100%; padding:12px; cursor:pointer;">
                    Update Password
                </button>

                <p style="text-align:center; margin-top:15px;">
                    <a href="#" onclick="event.preventDefault(); toggleResetSteps('request')"
                       style="font-size:13px; color:#0a66c2; text-decoration:none;">
                        ← Use a different email
                    </a>
                </p>
            </form>
        </div>

        <div style="margin-top:25px; font-size:14px; text-align:center;
                    border-top:1px solid #eee; padding-top:20px;">
            Remembered it?
            <a href="login.html" style="color:#0a66c2; font-weight:bold; text-decoration:none;">
                Login
            </a>
        </div>
    </div>
</div>

<script src="../assets/js/main.js?v=1.2"></script>
<script src="../assets/js/auth.js"></script>
<script>
    
    function toggleResetSteps(step) {
        const requestDiv = document.getElementById('step-request');
        const resetDiv   = document.getElementById('step-reset');
        const alertBox   = document.getElementById('alert-box');

        if (alertBox) alertBox.innerHTML = '';

        if (step === 'reset') {
            requestDiv.style.display = 'none';
            resetDiv.style.display   = 'block';
            document.getElementById('otp').focus();
        } else {
            requestDiv.style.display = 'block';
            resetDiv.style.display   = 'none';
        }
    }
</script>
</body>
</html>
