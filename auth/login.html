<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - JSTACK</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

<header class="navbar">
    <h2>JSTACK</h2>
    <a href="../index.html" class="nav-back">← Back to Home</a>
</header>

<div class="form-container">
    <div class="form-box">
        <h2>Welcome Back</h2>
        <p class="form-subtitle">Sign in to continue to JSTACK</p>

        <div id="alert-box"></div>

        <form onsubmit="return false;">
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email"
                    placeholder="you@example.com"
                    required autocomplete="username">
            </div>

            <div class="input-group pass-wrapper">
                <div class="label-row">
                    <label for="password">Password</label>
                    <a href="forgot-password.html" class="link-small">Forgot?</a>
                </div>
                <input type="password" id="password"
                    placeholder="••••••••"
                    required autocomplete="current-password">
                <button type="button" class="toggle-btn" onclick="togglePass(this)">Show</button>
            </div>

            <button type="button" id="login-btn" onclick="handleLogin()" class="full-width">
                Login
            </button>
        </form>

        <div class="form-footer">
            Don't have an account? <a href="register.html">Register here</a>
        </div>
    </div>
</div>

<script src="../assets/js/main.js?v=1.2"></script>
<script src="../assets/js/auth.js"></script>
<script>
    // ── Toggle password visibility ──
    function togglePass(btn) {
        const input = document.getElementById('password');
        const show  = input.type === 'password';
        input.type      = show ? 'text' : 'password';
        btn.textContent = show ? 'Hide' : 'Show';
    }

    // ── Allow Enter key to submit ──
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleLogin();
        });
        document.getElementById('email').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleLogin();
        });
    });
</script>
</body>
</html>
