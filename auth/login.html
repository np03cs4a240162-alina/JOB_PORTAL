<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - JSTACK</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.05) 0%, transparent 40%),
                        radial-gradient(circle at 90% 80%, rgba(16, 185, 129, 0.05) 0%, transparent 40%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .login-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            animation: fadeIn 0.8s var(--ease-out);
        }

        .login-card {
            background: var(--bg-card);
            width: 100%;
            max-width: 440px;
            padding: 48px;
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-premium);
            border: 1px solid var(--border-light);
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 5px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
        }

        .login-header { text-align: center; margin-bottom: 35px; }
        .login-header h1 { font-size: 28px; font-weight: 900; color: var(--text-dark); letter-spacing: -1px; margin-bottom: 8px; }
        .login-header p { color: var(--text-light); font-size: 15px; }

        .form-group { margin-bottom: 24px; position: relative; }
        .form-group label { display: block; font-size: 13px; font-weight: 700; color: var(--text-mid); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .input-icon-wrapper { position: relative; }
        .input-icon-wrapper i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-light); transition: var(--transition); }
        .input-icon-wrapper input { width: 100%; padding: 14px 16px 14px 45px; border: 1px solid var(--border); border-radius: var(--radius-md); font-weight: 500; transition: var(--transition); background: var(--bg-soft); }
        .input-icon-wrapper input:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 4px var(--primary-light); }
        .input-icon-wrapper input:focus + i { color: var(--primary); }

        .pass-toggle { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-light); cursor: pointer; padding: 0; box-shadow: none; }
        .pass-toggle:hover { color: var(--primary); }

        .btn-login { width: 100%; padding: 15px; font-size: 16px; font-weight: 700; margin-top: 10px; }

        .login-footer { margin-top: 30px; text-align: center; font-size: 14px; color: var(--text-mid); border-top: 1px solid var(--border-light); padding-top: 25px; }
        .login-footer a { font-weight: 700; color: var(--primary); }

        @media (max-width: 480px) {
            .login-card { padding: 30px 24px; }
        }
    </style>
</head>
<body>

<header class="navbar" style="background: transparent; border: none; box-shadow: none;">
    <div class="nav-container">
        <h2>JSTACK</h2>
        <a href="../index.html" style="font-weight: 700; font-size: 14px; color: var(--text-dark); display: flex; align-items: center; gap: 8px;"><i class="fas fa-home"></i> Home</a>
    </div>
</header>

<div class="login-wrapper">
    <div class="login-card">
        <div class="login-header">
            <h1>Welcome Back</h1>
            <p>Access your dashboard and manage your career</p>
        </div>

        <div id="alert-box"></div>

        <form id="loginForm" onsubmit="return false;">
            <div class="form-group">
                <label>Email Address</label>
                <div class="input-icon-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" placeholder="name@company.com" required autocomplete="username">
                </div>
            </div>

            <div class="form-group">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                    <label style="margin:0;">Password</label>
                    <a href="forgot-password.html" style="font-size: 12px; font-weight: 700; color: var(--primary);">Forgot?</a>
                </div>
                <div class="input-icon-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
                    <button type="button" class="pass-toggle" onclick="togglePass(this)"><i class="fas fa-eye"></i></button>
                </div>
            </div>

            <button type="button" id="login-btn" onclick="handleLogin()" class="btn-login">Sign In <i class="fas fa-arrow-right"></i></button>
        </form>

        <div class="login-footer">
            Don't have an account? <a href="register.html">Create free account</a>
        </div>
    </div>
</div>

<script src="../assets/js/main.js?v=1.2"></script>
<script src="../assets/js/auth.js"></script>
<script>
    function togglePass(btn) {
        const input = document.getElementById('password');
        const icon = btn.querySelector('i');
        const show = input.type === 'password';
        
        input.type = show ? 'text' : 'password';
        icon.className = show ? 'fas fa-eye-slash' : 'fas fa-eye';
    }

    document.querySelectorAll('input').forEach(input => {
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleLogin();
        });
    });
</script>
</body>
