<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Access your SmartJob account. Welcome back.">
    <title>Sign In | SmartJob Nepal</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <style>
        body {
            background: linear-gradient(135deg, var(--bg-deep) 0%, #f1f5f9 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        [data-theme="dark"] body {
            background: linear-gradient(135deg, var(--bg-deep) 0%, #0b0f19 100%);
        }
        .auth-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 120px 20px 60px;
        }
    </style>
</head>
<body>

<header class="global-nav"></header>

<div class="auth-wrapper">
    <div class="form-box animate-in">
        <div style="margin-bottom: 32px;">
            <div style="font-size: 32px; font-weight: 950; letter-spacing: -2px; color: var(--text-main); margin-bottom: 8px;">
                Smart<span style="color: var(--primary);">Job</span>
            </div>
            <h2 style="font-size: 24px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 6px;">Welcome Back</h2>
            <p style="color: var(--text-muted); font-size: 14px; font-weight: 500;">Sign in to unlock Nepal's smartest career opportunities.</p>
        </div>

        <div id="alert-box"></div>

        <!-- Tabs for Switching Sign In Method -->
        <div style="display: flex; gap: 8px; margin-bottom: 24px; border-bottom: 1px solid var(--border); padding-bottom: 12px;">
            <button id="tab-password" type="button" onclick="switchLoginMethod('password')" class="btn" style="flex: 1; padding: 10px; font-size: 14px; font-weight: 700; border-radius: var(--radius); background: var(--primary); color: white; border: none; transition: 0.2s; cursor: pointer; justify-content: center;">
                <i class="fas fa-key" style="margin-right: 6px;"></i> Password
            </button>
            <button id="tab-otp" type="button" onclick="switchLoginMethod('otp')" class="btn btn-glass" style="flex: 1; padding: 10px; font-size: 14px; font-weight: 700; border-radius: var(--radius); border: 1px solid var(--border); background: transparent; color: var(--text-muted); transition: 0.2s; cursor: pointer; justify-content: center;">
                <i class="fas fa-envelope" style="margin-right: 6px;"></i> Secure OTP
            </button>
        </div>

        <!-- Method 1: Password Login Container -->
        <div id="login-password-container">
            <form onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label for="email"><i class="far fa-envelope" style="margin-right: 6px; color: var(--text-dim);"></i> Email Address</label>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>
                <div class="input-group" style="margin-bottom: 24px;">
                    <label for="password"><i class="far fa-lock" style="margin-right: 6px; color: var(--text-dim);"></i> Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                
                <button type="submit" id="login-btn" class="btn btn-primary" style="width: 100%; padding: 14px; font-size: 15px; border-radius: var(--radius); justify-content: center;">
                    Sign In <i class="fas fa-arrow-right-to-bracket" style="margin-left: 8px;"></i>
                </button>
            </form>
        </div>

        <!-- Method 2: Secure OTP Login Container -->
        <div id="login-otp-container" style="display: none;">
            <!-- Step 1: Send OTP -->
            <div id="login-otp-step1">
                <form onsubmit="handleLoginOtpSend(event)">
                    <div class="input-group" style="margin-bottom: 24px;">
                        <label for="email-otp"><i class="far fa-envelope" style="margin-right: 6px; color: var(--text-dim);"></i> Email Address</label>
                        <input type="email" id="email-otp" placeholder="you@example.com" required>
                    </div>
                    <button type="submit" id="login-otp-send-btn" class="btn btn-primary" style="width: 100%; padding: 14px; font-size: 15px; border-radius: var(--radius); justify-content: center;">
                        Send Verification Code <i class="fas fa-paper-plane" style="margin-left: 8px;"></i>
                    </button>
                </form>
            </div>
            <!-- Step 2: Verify OTP -->
            <div id="login-otp-step2" style="display: none;">
                <p style="color: var(--text-muted); font-size: 14px; font-weight: 600; margin-bottom: 20px; line-height: 1.6;">
                    Enter the secure 6-digit verification code sent to your email:
                </p>
                <form onsubmit="handleLoginOtpVerify(event)">
                    <div class="input-group" style="margin-bottom: 20px;">
                        <label for="otp-code" style="text-align: center; display: block;"><i class="far fa-key" style="margin-right: 6px; color: var(--text-dim);"></i> Verification Code (OTP)</label>
                        <input type="text" id="otp-code" placeholder="••••••" maxlength="6"
                               style="font-size: 28px; letter-spacing: 12px; text-align: center; font-weight: 800;" required>
                    </div>
                    <button type="submit" id="login-otp-verify-btn" class="btn btn-primary" style="width: 100%; padding: 14px; font-size: 15px; border-radius: var(--radius); margin-bottom: 12px; justify-content: center;">
                        Verify & Sign In <i class="fas fa-circle-check" style="margin-left: 8px;"></i>
                    </button>
                </form>
                <div style="margin-bottom: 12px;">
                    <button id="resend-login-otp-btn" onclick="handleResendLoginOtp(event)" class="btn btn-glass" style="width: 100%; padding: 12px; font-size: 14px; border-radius: var(--radius); justify-content: center; width: 100%;" disabled>
                        <i class="fas fa-rotate-right" style="margin-right: 8px;"></i> Resend Code <span id="login-cooldown-timer">(30s)</span>
                    </button>
                </div>
            </div>
        </div>

        <script>
            function switchLoginMethod(method) {
                const tabPassword = document.getElementById('tab-password');
                const tabOtp = document.getElementById('tab-otp');
                const containerPassword = document.getElementById('login-password-container');
                const containerOtp = document.getElementById('login-otp-container');
                
                if (method === 'password') {
                    // Set active style for Password Tab
                    tabPassword.style.background = 'var(--primary)';
                    tabPassword.style.color = 'white';
                    tabPassword.style.border = 'none';
                    
                    // Reset OTP Tab
                    tabOtp.style.background = 'transparent';
                    tabOtp.style.color = 'var(--text-muted)';
                    tabOtp.style.border = '1px solid var(--border)';
                    
                    // Toggle Views
                    containerPassword.style.display = 'block';
                    containerOtp.style.display = 'none';
                } else {
                    // Reset Password Tab
                    tabPassword.style.background = 'transparent';
                    tabPassword.style.color = 'var(--text-muted)';
                    tabPassword.style.border = '1px solid var(--border)';
                    
                    // Set active style for OTP Tab
                    tabOtp.style.background = 'var(--primary)';
                    tabOtp.style.color = 'white';
                    tabOtp.style.border = 'none';
                    
                    // Toggle Views
                    containerPassword.style.display = 'none';
                    containerOtp.style.display = 'block';
                }
            }
        </script>

        <div style="margin-top: 24px; display: flex; flex-direction: column; gap: 12px; font-size: 14px; font-weight: 600;">
            <a href="forgot-password.html" style="color: var(--primary); transition: 0.2s;">Forgot password?</a>
            <span style="color: var(--text-muted);">New to SmartJob? <a href="register.html" style="color: var(--primary); transition: 0.2s;">Create a free account</a></span>
        </div>
    </div>
</div>

<footer class="premium-footer" style="padding: 40px 0; margin-top: auto; background: transparent; border-top: 1px solid var(--border);">
    <div class="container" style="text-align: center; color: var(--text-dim); font-size: 13px; font-weight: 600;">
        <p>&copy; 2026 SmartJob Nepal. All rights reserved.</p>
    </div>
</footer>

<script src="../assets/js/main.js"></script>
<script src="../assets/js/auth.js"></script>
</body>
</html>
