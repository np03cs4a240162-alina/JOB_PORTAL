<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Advance your career with SmartJob Nepal's industry-led expert trainings and workshops.">
    <title>Workshops & Skill Trainings | SmartJob Nepal</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <style>
        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }
        .trainings-hero {
            padding: 180px 0 100px;
            background: radial-gradient(circle at top right, rgba(244, 124, 72, 0.08), transparent 70%);
            text-align: center;
        }
        .filter-tabs {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 40px;
            margin-bottom: 20px;
        }
        .filter-tab {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 10px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 700;
            font-size: 13px;
            transition: var(--transition);
        }
        .filter-tab:hover, .filter-tab.active {
            border-color: var(--primary);
            color: var(--primary);
            background: rgba(244, 124, 72, 0.06);
            transform: translateY(-2px);
        }
        .train-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
            gap: 32px;
            margin-bottom: 80px;
        }
        .train-card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 32px;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .train-card:hover {
            transform: translateY(-8px);
            border-color: var(--primary);
            box-shadow: var(--shadow-lg);
        }
    </style>
</head>
<body>

<header class="global-nav"></header>

<section class="trainings-hero">
    <div class="container animate-in">
        <span class="badge badge-info" style="margin-bottom: 16px; font-weight:800; text-transform: uppercase; padding: 6px 16px;">SmartAcademy Hub</span>
        <h1 style="font-size: 54px; font-weight: 900; letter-spacing: -2.5px; color: var(--text-main); margin-bottom: 20px;">Supercharge Your Tech Career</h1>
        <p style="color: var(--text-muted); font-size: 20px; max-width: 650px; margin: 0 auto; font-weight: 500; line-height: 1.6;">
            Learn from industry leaders in Nepal. Practical, immersive workshops built to close active tech market skill gaps.
        </p>

        <div class="filter-tabs">
            <button class="filter-tab active" onclick="filterTrainings('all')">All Trainings</button>
            <button class="filter-tab" onclick="filterTrainings('development')">Development</button>
            <button class="filter-tab" onclick="filterTrainings('design')">UI/UX & Design</button>
            <button class="filter-tab" onclick="filterTrainings('ai')">AI & Machine Learning</button>
        </div>
    </div>
</section>

<div class="container">
    <div class="train-grid animate-in" id="dynamic-train-list">
        <div style="text-align: center; grid-column: 1/-1; padding: 60px;">
            <i class="fas fa-spinner fa-spin" style="font-size: 32px; color: var(--primary);"></i>
            <p style="margin-top: 12px; font-weight: 600; color: var(--text-muted);">Fetching premium workshops...</p>
        </div>
    </div>
</div>

<footer class="premium-footer" style="padding: 60px 0; border-top: 1px solid var(--border); margin-top: 80px;">
    <div class="container" style="text-align: center; color: var(--text-dim); font-size: 14px; font-weight: 600;">
        <p>&copy; 2026 SmartJob Nepal. All rights reserved.</p>
    </div>
</footer>

<script src="assets/js/main.js"></script>
<script>
    let allTrainings = [];
    let userSkills = [];

    function filterTrainings(category) {
        document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
        event.target.classList.add('active');
        renderList(category);
    }

    function renderList(category = 'all') {
        const container = document.getElementById('dynamic-train-list');
        let filtered = allTrainings;

        if (category !== 'all') {
            filtered = allTrainings.filter(t => {
                const titleLower = t.title.toLowerCase();
                const descLower = t.description.toLowerCase();
                if (category === 'development') {
                    return titleLower.includes('code') || titleLower.includes('dev') || titleLower.includes('full') || titleLower.includes('web') || titleLower.includes('node') || titleLower.includes('react');
                }
                if (category === 'design') {
                    return titleLower.includes('design') || titleLower.includes('figma') || titleLower.includes('ui') || titleLower.includes('ux');
                }
                if (category === 'ai') {
                    return titleLower.includes('ai') || titleLower.includes('machine') || titleLower.includes('python') || titleLower.includes('learning') || descLower.includes('ai');
                }
                return true;
            });
        }

        if (filtered.length > 0) {
            container.innerHTML = filtered.map(t => {
                const initialLetter = t.title ? t.title.charAt(0).toUpperCase() : 'W';
                const companyName = t.employer_name || 'SmartAcademy';

                // Attach AI Match Badge
                let aiMatchBadge = '';
                if (t.aiScore) {
                    aiMatchBadge = `
                        <span style="font-size: 11px; font-weight: 800; color: var(--primary); background: rgba(244, 124, 72, 0.08); border: 1px solid rgba(244, 124, 72, 0.15); padding: 6px 12px; border-radius: 100px; display: inline-flex; align-items: center; gap: 4px;">
                            <i class="fas fa-wand-magic-sparkles"></i> ${t.aiScore}% Match
                        </span>
                    `;
                }

                return `
                    <div class="train-card" onclick="location.href='trainings/detail.html?id=${t.id}'" style="cursor:pointer;">
                        <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px;">
                            <!-- Circle letter badge like "S" or "A" or "D" -->
                            <div style="width: 56px; height: 56px; background: #fff9f4; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 950; color: var(--primary); border: 1px solid rgba(244, 124, 72, 0.1);">${initialLetter}</div>
                            <!-- Status tag -->
                            <span class="status-tag" style="background: rgba(244, 124, 72, 0.08); color: var(--primary); border: 1px solid rgba(244, 124, 72, 0.15); padding: 6px 12px; font-size: 10px; border-radius: 30px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px;">Registering</span>
                        </div>
                        <h3 style="font-size: 20px; font-weight: 850; letter-spacing: -0.5px; color: var(--text-main); margin-bottom: 8px; line-height: 1.3;">
                            ${escHtml(t.title)}
                        </h3>
                        <p style="color: var(--text-muted); font-size: 14px; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 6px;">
                            ${escHtml(companyName)} • ${escHtml(t.duration || 'Flexible')}
                        </p>
                        <!-- Description -->
                        <p style="color: var(--text-dim); font-size: 13.5px; font-weight: 500; line-height: 1.6; margin-bottom: 24px; min-height: 44px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; text-overflow: ellipsis;">
                            ${escHtml(t.description)}
                        </p>
                        
                        <!-- Pills/Tags row -->
                        <div style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px;">
                            <span style="font-size: 11px; font-weight: 800; color: var(--text-dim); background: var(--bg-deep); padding: 6px 12px; border-radius: 100px; border: 1px solid var(--border); display: inline-flex; align-items: center; gap: 4px;">
                                <i class="fas fa-certificate" style="color: var(--status-success);"></i> Certificate Included
                            </span>
                            ${aiMatchBadge}
                        </div>

                        <!-- Price and button row -->
                        <div style="display: flex; justify-content: space-between; align-items: center; padding-top: 20px; border-top: 1px solid var(--border); margin-top: auto;">
                            <span style="color: var(--status-success); font-weight: 900; font-size: 18px;">${t.price || 'Free'}</span>
                            <div class="btn btn-primary" style="padding: 10px 20px; font-size: 13px; border-radius: var(--radius); font-weight: 800; display: inline-flex; align-items: center; gap: 6px;">
                                View Program <i class="fas fa-arrow-right" style="font-size: 11px;"></i>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        } else {
            container.innerHTML = `
                <div style="text-align: center; grid-column: 1/-1; padding: 80px; color: var(--text-dim);">
                    <div style="font-size: 48px; color: var(--border); margin-bottom: 16px;"><i class="fas fa-graduation-cap"></i></div>
                    <div style="font-size: 16px; font-weight: 800; color: var(--text-main);">No available training programs</div>
                    <p style="font-size: 14px; font-weight: 500; margin-top: 6px;">Check back later for newly published workshops.</p>
                </div>
            `;
        }
    }

    async function load() {
        // Attempt to fetch seeker skills for AI matching
        try {
            const user = await getCurrentUser();
            if (user && user.role === 'seeker') {
                const profileRes = await apiGet('/profiles.php?id=' + user.id);
                if (profileRes && profileRes.success && profileRes.data && profileRes.data.skills) {
                    userSkills = profileRes.data.skills.toLowerCase().split(',').map(s => s.trim()).filter(s => s);
                }
            }
        } catch (err) { console.log('Skipped user skills fetching.'); }

        const res = await apiGet('/trainings.php');
        if (res.success && res.data.length > 0) {
            allTrainings = res.data;
            
            // Calculate AI Scores
            allTrainings.forEach(t => {
                let score = 65;
                const courseText = (t.title + ' ' + (t.description || '')).toLowerCase();
                if (userSkills.length > 0) {
                    let matches = 0;
                    userSkills.forEach(skill => {
                        if (courseText.includes(skill)) matches++;
                    });
                    if (matches > 0) {
                        const ratio = matches / Math.min(userSkills.length, 3); // Workshops are focused, so divide by 3 max
                        score = Math.min(70 + Math.round(ratio * 28), 98);
                    } else {
                        score = Math.floor(Math.random() * (75 - 65 + 1)) + 65;
                    }
                } else {
                    score = Math.floor(Math.random() * (82 - 70 + 1)) + 70;
                }
                t.aiScore = score;
            });

            renderList('all');
        } else {
            renderList('all');
        }
    }
    load();
</script>

</body>
</html>
