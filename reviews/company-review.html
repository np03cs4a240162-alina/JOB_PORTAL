<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Read and post honest company reviews, workplace environment feedback and ratings.">
    <title>Company Reviews & Workplace Feedback | SmartJob Nepal</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <style>
        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }
        .reviews-layout {
            padding-top: 120px;
            padding-bottom: 60px;
        }
        .review-panel {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 32px;
            box-shadow: var(--shadow-sm);
            margin-bottom: 32px;
        }
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 16px;
        }
        .panel-header h3 {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: -1px;
            color: var(--text-main);
        }
        .search-container {
            position: relative;
            margin-bottom: 24px;
        }
        .search-container input {
            width: 100%;
            padding: 16px 20px 16px 48px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--bg-deep);
            color: var(--text-main);
            font-size: 15px;
            font-weight: 500;
        }
        .search-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 16px;
        }
        .review-item {
            border-bottom: 1px solid var(--border);
            padding: 24px 0;
        }
        .review-item:last-child {
            border-bottom: none;
        }
        .stars {
            color: #f59e0b;
            font-size: 16px;
            letter-spacing: 2px;
        }
        .avg-rating-badge {
            background: rgba(244, 124, 72, 0.08);
            border: 1px solid var(--border);
            padding: 12px 20px;
            border-radius: var(--radius);
            color: var(--primary);
            font-weight: 800;
            font-size: 14px;
            display: inline-block;
        }
    </style>
</head>
<body>

<header class="global-nav"></header>

<div class="container reviews-layout" style="max-width: 800px;">
    <!-- Headline Card -->
    <div class="review-panel animate-in">
        <div class="panel-header">
            <h3>Company Reviews</h3>
            <div id="avg-rating"></div>
        </div>
        
        <div class="search-container">
            <span class="search-icon"><i class="fas fa-magnifying-glass"></i></span>
            <input type="text" id="search-company" placeholder="Filter reviews by company name (e.g. Cloud Tech)..." onkeyup="loadReviews()">
        </div>
    </div>

    <!-- Review Submission -->
    <div class="review-panel animate-in" id="review-form-container">
        <h3 style="font-size: 18px; font-weight: 800; color: var(--text-main); margin-bottom: 24px;">Share Workplace Experience</h3>
        <div class="input-group">
            <label for="company">Company Name</label>
            <input type="text" id="company" placeholder="E.g. SmartJob Labs">
        </div>
        <div class="input-group">
            <label for="rating">Environment Rating</label>
            <select id="rating">
                <option value="5">5 Stars - Outstanding Workplace</option>
                <option value="4">4 Stars - Productive & Healthy</option>
                <option value="3">3 Stars - Standard Workplace</option>
                <option value="2">2 Stars - Minor Concerns</option>
                <option value="1">1 Star - Not Recommended</option>
            </select>
        </div>
        <div class="input-group">
            <label for="review">Feedback Details</label>
            <textarea id="review" placeholder="Describe the work culture, work-life balance, career progression..." style="height: 120px; resize: none;"></textarea>
        </div>
        <button class="btn btn-primary" id="submit-btn" onclick="submitReview()" style="padding: 12px 28px; font-size: 14px;">
            Post Public Review <i class="fas fa-paper-plane" style="margin-left: 8px;"></i>
        </button>
    </div>

    <!-- Reviews List -->
    <div class="review-panel animate-in">
        <h3 style="font-size: 18px; font-weight: 800; color: var(--text-main); margin-bottom: 24px; border-bottom: 1px solid var(--border); padding-bottom: 12px;">Recent Submissions</h3>
        <div id="reviews-list">
            <div style="text-align: center; padding: 40px; color: var(--text-dim);">
                <i class="fas fa-spinner fa-spin" style="font-size: 24px; color: var(--primary);"></i>
            </div>
        </div>
    </div>
</div>

<footer class="premium-footer" style="padding: 60px 0; border-top: 1px solid var(--border); margin-top: 80px;">
    <div class="container" style="text-align: center; color: var(--text-dim); font-size: 14px; font-weight: 600;">
        <p>&copy; 2026 SmartJob Nepal. All rights reserved.</p>
    </div>
</footer>

<script src="../assets/js/main.js"></script>
<script>
    let currentUser = null;
    const RES_URL = '/reviews.php'; 

    async function init() {
        currentUser = await getCurrentUser();
        const form = document.getElementById('review-form-container');
        if (!currentUser && form) {
            form.innerHTML = `
                <div style="text-align: center; padding: 32px;">
                    <p style="font-size: 15px; font-weight: 600; color: var(--text-muted); margin-bottom: 20px;">Want to share your honest workplace experience?</p>
                    <a href="../auth/login.html" class="btn btn-primary" style="text-decoration:none; padding: 12px 28px; display:inline-block; font-size:14px;">Login to Write Review</a>
                </div>`;
        }
        loadReviews();
    }

    async function loadReviews() {
        const list = document.getElementById('reviews-list');
        const avgDisp = document.getElementById('avg-rating');
        const search = document.getElementById('search-company').value.trim();
        const url = search ? `${RES_URL}?company=${encodeURIComponent(search)}` : RES_URL;

        try {
            const data = await apiGet(url);

            if (data && data.total_count > 0) {
                const totalScore = data.reviews.reduce((acc, r) => acc + parseInt(r.rating), 0);
                const calcAvg = (totalScore / data.total_count).toFixed(1);
                avgDisp.innerHTML = `<div class="avg-rating-badge"><i class="fas fa-star" style="margin-right: 6px;"></i> ${calcAvg} Rating (${data.total_count} Reviews)</div>`;
            } else {
                avgDisp.innerHTML = '';
            }

            if (!data.reviews || data.reviews.length === 0) {
                list.innerHTML = `<p style="text-align:center; color: var(--text-dim); font-weight: 600; padding:40px;">No public workplace reviews yet.</p>`;
                return;
            }

            list.innerHTML = data.reviews.map(r => `
                <div class="review-item" id="rev-${r.id}">
                    <div style="display:flex; justify-content:space-between; margin-bottom:12px;">
                        <div>
                            <div style="font-size: 16px; font-weight: 800; color: var(--primary); margin-bottom: 4px;">${escHtml(r.company)}</div>
                            <div class="stars">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</div>
                        </div>
                        ${currentUser && (currentUser.id == r.user_id || currentUser.role === 'admin') ? 
                            `<button onclick="deleteReview(${r.id})" class="btn btn-glass" style="padding: 6px 12px; font-size:11px; border-color: rgba(239,68,68,0.3); color:#ef4444;">Delete</button>` : ''}
                    </div>
                    <div style="color: var(--text-main); font-size: 14px; font-weight: 500; line-height: 1.6; margin-bottom: 12px; white-space: pre-line;">${escHtml(r.review)}</div>
                    <div style="color: var(--text-muted); font-size: 12px; font-weight: 600;">
                        By <strong>${escHtml(r.author)}</strong> &bull; ${new Date(r.created_at).toLocaleDateString()}
                    </div>
                </div>
            `).join('');
        } catch (e) {
            list.innerHTML = `<p style="color:#ef4444; text-align:center; font-weight:600; padding:20px;">Failed to fetch reviews feed.</p>`;
        }
    }

    async function submitReview() {
        const company = document.getElementById('company').value.trim();
        const rating = document.getElementById('rating').value;
        const review = document.getElementById('review').value.trim();
        if(!company || !review) return alert("Please fill out company name and description.");

        const res = await apiPost(RES_URL, { company, rating, review });
        if(res.success) {
            document.getElementById('company').value = '';
            document.getElementById('review').value = '';
            loadReviews();
        } else {
            alert(res.error);
        }
    }

    async function deleteReview(id) {
        if(confirm("Permanently delete this public review?")) {
            const res = await apiDelete(`${RES_URL}?id=${id}`);
            if(res.success) loadReviews();
        }
    }

    document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
