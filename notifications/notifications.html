<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="View system updates, application milestones and security alerts.">
    <title>Notifications Hub | SmartJob Nepal</title>
    <link class="stylesheet" rel="stylesheet" href="../assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <style>
        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }
        .notif-layout {
            padding-top: 120px;
            padding-bottom: 60px;
        }
        .notif-panel {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 32px;
            box-shadow: var(--shadow-sm);
        }
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 16px;
        }
        .panel-header h3 {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: -1px;
            color: var(--text-main);
        }
        .notif-feed-item {
            background: var(--bg-deep);
            border: 1px solid var(--border);
            padding: 20px 24px;
            border-radius: var(--radius-lg);
            margin-bottom: 16px;
            position: relative;
            transition: all 0.2s ease;
        }
        .notif-feed-item.unread {
            border-left: 4px solid var(--primary);
        }
    </style>
</head>
<body>

<header class="global-nav"></header>

<div class="container notif-layout" style="max-width: 720px;">
    <div class="notif-panel animate-in">
        <div class="panel-header">
            <h3>Notifications</h3>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-glass" onclick="markRead()" style="padding: 8px 14px; font-size: 13px;">Mark All Read</button>
                <button class="btn btn-glass" onclick="clearAll()" style="padding: 8px 14px; font-size: 13px; border-color: rgba(239,68,68,0.3); color: #ef4444;">Clear All</button>
            </div>
        </div>

        <div id="notif-list">
            <div style="text-align: center; padding: 40px; color: var(--text-dim);">
                <i class="fas fa-spinner fa-spin" style="font-size: 24px; color: var(--primary);"></i>
            </div>
        </div>
    </div>
</div>

<footer class="premium-footer" style="padding: 60px 0; border-top: 1px solid var(--border); margin-top: 80px;">
    <div class="container" style="text-align: center; color: var(--text-dim); font-size: 14px; font-weight: 600;">
        <p>&copy; 2026 SmartJob Nepal. All rights reserved.</p>
    </div>
</footer>

<script src="../assets/js/main.js"></script>
<script>
    async function init() {
        await requireLogin();
        load();
    }

    async function load() {
        const data = await apiGet('/notifications.php');
        const list = document.getElementById('notif-list');
        
        if (!data || !Array.isArray(data) || !data.length) {
            list.innerHTML = `
                <div style="text-align: center; padding: 60px; color: var(--text-dim);">
                    <div style="font-size: 48px; color: var(--border); margin-bottom: 16px;"><i class="far fa-bell"></i></div>
                    <div style="font-size: 16px; font-weight: 800; color: var(--text-main);">No notifications yet</div>
                    <p style="font-size: 14px; font-weight: 500; margin-top: 6px;">We will alert you on match recommendations and pipeline progress.</p>
                </div>`;
            return;
        }
        
        list.innerHTML = data.map(n => {
            const txt = n.message.toLowerCase();
            let icon = 'fa-bell';
            let color = 'var(--text-main)';
            let bg = 'rgba(255,255,255,0.05)';
            
            if (txt.includes('message')) {
                icon = 'fa-comment-dots';
                color = '#3b82f6';
                bg = 'rgba(59, 130, 246, 0.1)';
            } else if (txt.includes('application') || txt.includes('applied')) {
                icon = 'fa-briefcase';
                color = '#10b981';
                bg = 'rgba(16, 185, 129, 0.1)';
            } else if (txt.includes('status') || txt.includes('shortlist')) {
                icon = 'fa-clipboard-check';
                color = '#f59e0b';
                bg = 'rgba(245, 158, 11, 0.1)';
            } else if (txt.includes('training') || txt.includes('enrolled')) {
                icon = 'fa-graduation-cap';
                color = '#8b5cf6';
                bg = 'rgba(139, 92, 246, 0.1)';
            }

            return `
            <div class="notif-feed-item ${n.is_read ? '' : 'unread'}" style="display: flex; gap: 16px; align-items: flex-start; ${n.is_read ? '' : 'background: rgba(244, 124, 72, 0.03); border-color: rgba(244, 124, 72, 0.2);'}">
                <div style="width: 42px; height: 42px; border-radius: 12px; background: ${bg}; color: ${color}; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0;">
                    <i class="fas ${icon}"></i>
                </div>
                <div style="flex: 1;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
                        <p style="color: ${n.is_read ? 'var(--text-main)' : 'var(--primary)'}; font-size: 15px; font-weight: 600; margin: 0;">${escHtml(n.message)}</p>
                        ${n.is_read ? '' : '<span style="width: 8px; height: 8px; border-radius: 50%; background: var(--primary); display: inline-block; box-shadow: 0 0 8px var(--primary);"></span>'}
                    </div>
                    <small style="color: var(--text-muted); font-size: 12px; font-weight: 600;">
                        <i class="far fa-clock" style="margin-right: 4px;"></i> ${new Date(n.created_at).toLocaleString()}
                    </small>
                </div>
            </div>`;
        }).join('');
    }

    async function markRead() {
        await apiPut('/notifications.php', {});
        load();
    }

    async function clearAll() {
        if (!confirm('Permanently delete all notifications?')) return;
        await apiDelete('/notifications.php');
        load();
    }

    init();
</script>
</body>
</html>
