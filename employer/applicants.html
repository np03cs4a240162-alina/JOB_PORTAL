<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Applicants - JSTACK</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<header class="navbar">
  <div class="nav-container">
    <h2>JSTACK</h2>
    <div id="nav-actions"></div> </div>
</header>

<div class="container" style="margin-top: 30px;">
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
    <h2 class="title" style="margin:0;">Job Applicants</h2>
    <a href="dashboard.html" class="btn-secondary" style="text-decoration:none; font-size:14px;">← Back to Dashboard</a>
  </div>

  <div id="alert-box"></div>

  <div class="table-container shadow-sm" style="background: white; border-radius: 8px; overflow: hidden;">
    <table style="width: 100%; border-collapse: collapse;">
      <thead>
        <tr style="background: #0a66c2; color: white; text-align: left;">
          <th style="padding: 12px;">Applicant</th>
          <th>Email</th>
          <th>Job Title</th>
          <th>Applied Date</th>
          <th>Status</th>
          <th style="text-align: center;">Actions</th>
        </tr>
      </thead>
      <tbody id="applicants-table">
        <tr><td colspan="6" style="text-align:center; padding: 40px;">
          <i class="fas fa-spinner fa-spin"></i> Loading applicants...
        </td></tr>
      </tbody>
    </table>
  </div>
</div>

<footer style="margin-top: 50px; text-align: center; color: #888; font-size: 14px;">
  <p>© 2026 JSTACK</p>
</footer>

<script src="../assets/js/main.js"></script>
<script>
  /**
   * Initialize page and fetch data
   */
  async function init() {
    // 1. Protect page: ensure only employers can see this
    const user = await checkAuth('employer');
    if (!user) return;

    // 2. Fetch data (API uses the BASE path automatically from main.js)
    const res = await apiGet('/applications.php');
    const tbody = document.getElementById('applicants-table');
    
    // 3. Handle empty states
    if (!res.success || !res.data || res.data.length === 0) {
      tbody.innerHTML = `
        <tr>
          <td colspan="6" style="text-align:center; padding: 50px; color: #666;">
            <div style="font-size: 40px; margin-bottom: 10px; color: #ccc;"><i class="fas fa-user-slash"></i></div>
            No applications received yet.
          </td>
        </tr>`;
      return;
    }

    // 4. Render Table Rows
    tbody.innerHTML = res.data.map(a => {
      // Logic for status badge colors
      const statusColor = a.status === 'accepted' ? '#28a745' : (a.status === 'rejected' ? '#dc3545' : '#ffc107');
      const textColor = a.status === 'pending' ? '#000' : '#fff';

      return `
      <tr style="border-bottom: 1px solid #eee;">
        <td style="padding: 15px;">
          <div style="font-weight: 600; color: #333;">${escHtml(a.seeker_name)}</div>
        </td>
        <td style="color: #666;">${escHtml(a.seeker_email)}</td>
        <td style="color: #0a66c2; font-weight: 500;">${escHtml(a.job_title)}</td>
        <td style="font-size: 13px; color: #888;">
          ${new Date(a.applied_at).toLocaleDateString(undefined, {month:'short', day:'numeric', year:'numeric'})}
        </td>
        <td>
          <span style="background: ${statusColor}; color: ${textColor}; padding: 4px 10px; border-radius: 20px; font-size: 11px; text-transform: uppercase; font-weight: bold;">
            ${a.status}
          </span>
        </td>
        <td style="text-align: center;">
          <div style="display:flex; gap:8px; justify-content:center; align-items:center;">
            <button class="btn-sm" onclick="location.href='seeker-profile.html?id=${a.seeker_id}'" style="background:#0a66c2; color:white; border:none; padding:6px 12px; border-radius:4px; cursor:pointer; font-size:12px;" title="View Candidate Profile">
              <i class="fas fa-user-tie"></i> Profile
            </button>
            <button class="btn-sm" onclick="viewResume(${a.seeker_id})" style="background:#6c757d; color:white; border:none; padding:6px 12px; border-radius:4px; cursor:pointer; font-size:12px;" title="View/Download Resume">
              <i class="fas fa-file-pdf"></i> Resume
            </button>
            <div style="width:2px; height:20px; background:#eee; margin:0 5px;"></div>
            ${a.status === 'pending' ? `
              <button class="btn-sm" onclick="updateStatus(${a.id}, 'accepted')" style="background:#28a745; color:white; border:none; padding:6px; border-radius:4px; cursor:pointer;" title="Shortlist">
                <i class="fas fa-check"></i>
              </button>
              <button class="btn-sm" onclick="updateStatus(${a.id}, 'rejected')" style="background:#dc3545; color:white; border:none; padding:6px; border-radius:4px; cursor:pointer;" title="Reject">
                <i class="fas fa-times"></i>
              </button>
            ` : `<span style="color:#777; font-size:11px; font-weight:bold; text-transform:uppercase;">${escHtml(a.status)}</span>`}
          </div>
        </td>
      </tr>`;
    }).join('');
  }

  async function viewResume(seekerId) {
      const res = await apiGet(`/upload.php?user_id=${seekerId}`);
      if (res.success && res.data.length > 0) {
          // Open the most recent resume
          const latest = res.data[0];
          window.open(`${BASE}/${latest.filepath}`, '_blank');
      } else {
          showAlert('alert-box', 'This candidate has not uploaded a resume yet.', 'error');
      }
  }

  /**
   * Update Application Status
   */
  async function updateStatus(id, newStatus) {
    setLoading(`verify-btn-${id}`, true, 'Updating...'); // Optional: unique button ID
    
    const res = await apiPost(`/applications.php?action=update-status`, { 
        id: id, 
        status: newStatus 
    });

    if (res.success) {
      showAlert('alert-box', `Application successfully ${newStatus}!`, 'success');
      init(); // Refresh the list
    } else {
      showAlert('alert-box', res.error || 'Failed to update status.', 'error');
    }
  }

  // Run on load
  init();
</script>

</body>
</html>
