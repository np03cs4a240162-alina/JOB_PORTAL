<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="View job candidate professional credentials.">
    <title>Candidate Profile Portfolio | SmartJob Nepal</title>
    <link class="stylesheet" rel="stylesheet" href="../assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <style>
        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }
        .dashboard-layout {
            padding-top: 120px;
            padding-bottom: 60px;
        }
        .profile-header {
            background: linear-gradient(135deg, var(--bg-surface) 0%, var(--bg-deep) 100%);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 48px;
            text-align: center;
            margin-bottom: 32px;
            box-shadow: var(--shadow-sm);
            position: relative;
        }
        .avatar-container {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary) 0%, #ff5722 100%);
            color: white;
            box-shadow: 0 8px 24px rgba(244, 124, 72, 0.2);
            overflow: hidden;
            border: 4px solid var(--bg-surface);
        }
        .avatar-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .dashboard-panel {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 32px;
            box-shadow: var(--shadow-sm);
            margin-bottom: 32px;
        }
        .panel-header-title {
            font-size: 18px;
            font-weight: 800;
            color: var(--text-main);
            border-bottom: 1px solid var(--border);
            padding-bottom: 12px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .skill-tag {
            display: inline-block;
            background: rgba(244, 124, 72, 0.08);
            color: var(--primary);
            padding: 6px 14px;
            border-radius: 30px;
            margin-right: 8px;
            margin-bottom: 8px;
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
        }
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }
        @media (max-width: 576px) {
            .info-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<header class="global-nav"></header>

<div class="container dashboard-layout" style="max-width: 800px;">
    <a href="applicants.html" class="btn btn-glass" style="font-size: 13px; padding: 10px 16px; margin-bottom: 28px; display: inline-flex;">
        <i class="fas fa-arrow-left" style="margin-right: 8px;"></i> Back to Applicants
    </a>

    <div class="profile-header animate-in">
        <div class="avatar-container" id="p-avatar-container">
            <span id="p-initial">?</span>
        </div>
        <h1 id="p-name" style="font-size: 28px; font-weight: 900; letter-spacing: -1px; color: var(--text-main); margin-bottom: 6px;">...</h1>
        <p id="p-role" style="color: var(--text-muted); font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;">Job Candidate</p>
    </div>

    <!-- Contact Info -->
    <div class="dashboard-panel animate-in">
        <div class="panel-header-title">
            <i class="far fa-address-card" style="color: var(--primary);"></i> Contact Information
        </div>
        <div class="info-grid">
            <div>
                <label style="display: block; font-size: 11px; font-weight: 800; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px;">Email Address</label>
                <div id="p-email" style="font-weight: 700; color: var(--text-main);">...</div>
            </div>
            <div>
                <label style="display: block; font-size: 11px; font-weight: 800; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px;">Phone Number</label>
                <div id="p-phone" style="font-weight: 700; color: var(--text-main);">...</div>
            </div>
        </div>
    </div>

    <!-- Resume section -->
    <div class="dashboard-panel animate-in">
        <div class="panel-header-title">
            <i class="far fa-file-lines" style="color: var(--primary);"></i> Candidate Resume Vault
        </div>
        <div id="p-resume" style="display:flex; align-items:center; justify-content:space-between; padding:20px; background: var(--bg-deep); border-radius: var(--radius); border: 1px solid var(--border);">
            <div style="display:flex; align-items:center; gap:16px;">
                <i class="fas fa-file-pdf" style="font-size:28px; color: #f44336;"></i>
                <div>
                    <div id="resume-filename" style="font-weight:800; color: var(--text-main); margin-bottom: 4px;">Fetching Resume...</div>
                    <div id="resume-date" style="font-size:12px; color: var(--text-muted); font-weight: 600;">...</div>
                </div>
            </div>
            <button id="resume-download-btn" class="btn btn-primary" style="padding: 10px 18px; font-size: 13px;">
                <i class="fas fa-download" style="margin-right: 6px;"></i> Download PDF
            </button>
        </div>
    </div>

    <!-- Skills section -->
    <div class="dashboard-panel animate-in">
        <div class="panel-header-title">
            <i class="far fa-star" style="color: var(--primary);"></i> Skills & Domain Expertise
        </div>
        <div id="p-skills">...</div>
    </div>

    <!-- Experience summary -->
    <div class="dashboard-panel animate-in">
        <div class="panel-header-title">
            <i class="far fa-clock" style="color: var(--primary);"></i> Professional Experience Summary
        </div>
        <div id="p-experience" style="font-size: 15px; line-height: 1.6; color: var(--text-main); font-weight: 500;">...</div>
    </div>

    <!-- Bio summary -->
    <div class="dashboard-panel animate-in">
        <div class="panel-header-title">
            <i class="far fa-circle-user" style="color: var(--primary);"></i> Candidate Bio Summary
        </div>
        <div id="p-bio" style="font-size: 15px; line-height: 1.6; color: var(--text-main); font-weight: 500; white-space: pre-wrap;">...</div>
    </div>
</div>

<footer class="premium-footer" style="padding: 60px 0; border-top: 1px solid var(--border); margin-top: 80px;">
    <div class="container" style="text-align: center; color: var(--text-dim); font-size: 14px; font-weight: 600;">
        <p>&copy; 2026 SmartJob Nepal. All rights reserved.</p>
    </div>
</footer>

<script src="../assets/js/main.js"></script>
<script>
    const seekerId = new URLSearchParams(location.search).get('id');

    async function init() {
        await checkAuth('employer');
        if (!seekerId) { 
            alert('No candidate selected'); 
            location.href='applicants.html'; 
            return; 
        }

        const res = await apiGet(`/profiles.php?id=${seekerId}`);
        if (res.success && res.data) {
            const p = res.data;
            document.getElementById('p-name').textContent = p.name;
            document.getElementById('p-email').textContent = p.email;
            document.getElementById('p-phone').textContent = p.phone || 'Not provided';
            document.getElementById('p-experience').textContent = p.experience || 'No summary provided';
            document.getElementById('p-bio').textContent = p.bio || 'This candidate hasn\'t added a bio yet.';
            document.getElementById('p-initial').textContent = p.name.charAt(0).toUpperCase();

            if (p.photo) {
                document.getElementById('p-avatar-container').innerHTML = `<img src="${getImageUrl(p.photo)}" alt="Candidate" onerror="this.onerror=null; this.outerHTML='<span id=\\'p-initial\\'>${p.name.charAt(0).toUpperCase()}</span>';">`;
            }

            if (p.skills) {
                const skillsArr = p.skills.split(',').map(s => s.trim());
                document.getElementById('p-skills').innerHTML = skillsArr.map(s => `<span class="skill-tag">${escHtml(s)}</span>`).join('');
            } else {
                document.getElementById('p-skills').textContent = 'No skills listed';
            }

            const rRes = await apiGet(`/upload.php?user_id=${seekerId}`);
            if(rRes.success && rRes.data.length > 0) {
                const resData = rRes.data[0];
                document.getElementById('resume-filename').textContent = resData.filename;
                document.getElementById('resume-date').textContent = 'Uploaded on ' + new Date(resData.uploaded_at).toLocaleDateString();
                document.getElementById('resume-download-btn').onclick = () => window.open(`${BASE}/${resData.filepath}`, '_blank');
            } else {
                document.getElementById('p-resume').innerHTML = '<p style="color: var(--text-dim); margin:0; font-style:italic; font-weight: 600;">No resume uploaded yet.</p>';
            }
        } else {
            alert('Candidate profile not found.');
            location.href = 'applicants.html';
        }
    }

    init();
</script>
</body>
</html>
