<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="View and manage your company corporate profiles.">
    <title>Company Profile Setup | SmartJob Nepal</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <style>
        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }
        .dashboard-layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 40px;
            padding-top: 120px;
            padding-bottom: 60px;
        }
        @media (max-width: 992px) {
            .dashboard-layout {
                grid-template-columns: 1fr;
            }
        }
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .profile-side-card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 32px;
            text-align: center;
            box-shadow: var(--shadow-sm);
        }
        .avatar-container {
            width: 96px;
            height: 96px;
            border-radius: 20px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary) 0%, #ff5722 100%);
            color: white;
            box-shadow: 0 8px 24px rgba(244, 124, 72, 0.2);
            overflow: hidden;
        }
        .avatar-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .side-nav {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .side-nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 600;
            color: var(--text-dim);
            text-decoration: none;
            transition: all 0.2s ease;
        }
        .side-nav-link:hover, .side-nav-link.active {
            background: rgba(244, 124, 72, 0.08);
            color: var(--primary);
        }
        .dashboard-panel {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 32px;
            box-shadow: var(--shadow-sm);
        }
        .panel-header {
            margin-bottom: 32px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 16px;
        }
        .panel-header h3 {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--text-main);
        }
        .avatar-wrapper-dashed {
            width: 120px;
            height: 120px;
            border-radius: 20px;
            margin: 0 auto 16px;
            border: 2px dashed var(--border);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-deep);
        }
        .avatar-wrapper-dashed img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>

<header class="global-nav"></header>

<div class="container">
    <div class="dashboard-layout">
        
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="profile-side-card">
                <div class="avatar-container" id="sb-logo-container">
                    <span id="sb-initial">...</span>
                </div>
                <h3 id="sb-name" style="font-size: 18px; font-weight: 800; color: var(--text-main); margin-bottom: 6px;">Loading...</h3>
                <p id="sb-industry" style="color: var(--text-muted); font-size: 13px; font-weight: 600; margin-bottom: 24px;">Employer</p>
                <a href="dashboard.html" class="btn btn-glass" style="width: 100%; padding: 10px; font-size: 13px;"><i class="fas fa-arrow-left" style="margin-right: 6px;"></i> Dashboard</a>
            </div>

            <nav class="side-nav">
                <a href="dashboard.html" class="side-nav-link"><i class="fas fa-chart-pie"></i> Dashboard</a>
                <a href="profile.html" class="side-nav-link active"><i class="fas fa-user-gear"></i> Company Profile</a>
                <a href="edit-job.html" class="side-nav-link"><i class="fas fa-briefcase"></i> Manage Jobs</a>
                <a href="post-job.html" class="side-nav-link"><i class="fas fa-plus-circle"></i> Post Job</a>
                <a href="applicants.html" class="side-nav-link"><i class="fas fa-users-viewfinder"></i> View Applicants</a>
                <a href="../messages/inbox.html" class="side-nav-link"><i class="fas fa-comment-dots"></i> Message Center</a>
            </nav>
        </aside>

        <!-- MAIN AREA -->
        <main class="main-area">
            <div class="dashboard-panel animate-in">
                <div class="panel-header">
                    <h3>Edit Company Profile</h3>
                </div>

                <div id="alert-box"></div>
                
                <!-- Logo Upload -->
                <div style="text-align: center; margin-bottom: 36px;">
                    <div class="avatar-wrapper-dashed">
                        <img id="profile-logo-preview" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=" onerror="this.onerror=null; this.style.display='none';">
                        <i class="far fa-image" style="font-size: 40px; color: var(--text-dim); position: absolute; z-index: 1;"></i>
                    </div>
                    <input type="file" id="logo-upload" accept="image/*" style="display: none;" onchange="handleImageUpload(event)">
                    <button onclick="document.getElementById('logo-upload').click()" class="btn btn-glass" style="font-size: 13px; padding: 10px 16px;">
                        <i class="fas fa-upload" style="margin-right: 8px;"></i> Change Corporate Logo
                    </button>
                </div>

                <div class="input-group">
                    <label for="company">Company Name</label>
                    <input type="text" id="company" placeholder="Company name">
                </div>

                <div class="input-group">
                    <label for="industry">Industry / Sector</label>
                    <input type="text" id="industry" placeholder="e.g. Technology, Software Development">
                </div>

                <div class="input-group">
                    <label for="website">Website Link</label>
                    <input type="url" id="website" placeholder="https://company.com">
                </div>

                <div class="input-group" style="margin-bottom: 32px;">
                    <label for="about">About Company</label>
                    <textarea id="about" rows="5" placeholder="Share your company's mission, workspace environment, and growth goals..."></textarea>
                </div>

                <button onclick="handleSave()" class="btn btn-primary" style="width: 100%; padding: 14px; font-size: 15px;">
                    Save Profile Changes <i class="fas fa-circle-check" style="margin-left: 8px;"></i>
                </button>
            </div>
        </main>
        
    </div>
</div>

<footer class="premium-footer" style="padding: 60px 0; border-top: 1px solid var(--border); margin-top: 80px;">
    <div class="container" style="text-align: center; color: var(--text-dim); font-size: 14px; font-weight: 600;">
        <p>&copy; 2026 SmartJob Nepal. All rights reserved.</p>
    </div>
</footer>

<script src="../assets/js/main.js"></script>
<script>
    async function init() {
        const user = await checkAuth('employer');
        if(!user) return;
        document.getElementById('sb-name').textContent = user.name;
        document.getElementById('sb-initial').textContent = user.name.charAt(0).toUpperCase();
        
        const dataRes = await apiGet('/profiles.php');
        if (dataRes && dataRes.success && dataRes.data) {
            const data = dataRes.data;
            document.getElementById('company').value  = data.company  || '';
            document.getElementById('industry').value = data.industry || '';
            document.getElementById('website').value  = data.website  || '';
            document.getElementById('about').value    = data.about    || '';
            
            if(data.industry) document.getElementById('sb-industry').textContent = data.industry;
            if(data.logo) {
                const logoUrl = getImageUrl(data.logo);
                document.getElementById('sb-logo-container').innerHTML = `<img src="${logoUrl}" alt="Logo" onerror="this.onerror=null; this.outerHTML='<span id=\\'sb-initial\\'>${user.name.charAt(0).toUpperCase()}</span>';">`;
                const preview = document.getElementById('profile-logo-preview');
                preview.src = logoUrl;
                preview.style.display = 'block';
            }
        }
    }

    async function handleImageUpload(e) {
        const file = e.target.files[0];
        if(!file) return;

        const fd = new FormData();
        fd.append('image', file);
        
        try {
            const result = await apiPostFile('/upload-image.php', fd);
            if(result.success) {
                showAlert('alert-box', 'Corporate logo updated successfully!', 'success');
                const logoUrl = getImageUrl(result.filename);
                document.getElementById('sb-logo-container').innerHTML = `<img src="${logoUrl}" alt="Logo">`;
                const preview = document.getElementById('profile-logo-preview');
                preview.src = logoUrl;
                preview.style.display = 'block';
            } else {
                showAlert('alert-box', result.error || 'Failed to upload logo.', 'error');
            }
        } catch (err) {
            showAlert('alert-box', 'An error occurred during upload.', 'error');
        }
    }

    async function handleSave() {
        const res = await apiPut('/profiles.php', {
            company:  document.getElementById('company').value.trim(),
            industry: document.getElementById('industry').value.trim(),
            website:  document.getElementById('website').value.trim(),
            about:    document.getElementById('about').value.trim(),
        });
        
        if (res.success) {
            showAlert('alert-box', 'Company profile successfully saved!', 'success');
            document.getElementById('sb-industry').textContent = document.getElementById('industry').value.trim() || 'Employer';
        } else {
            showAlert('alert-box', res.error || 'Failed to save changes.', 'error');
        }
    }

    init();
</script>
</body>
</html>
