<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="View and manage your active training programs.">
    <title>Manage Trainings | SmartJob Nepal</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <style>
        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }
        .dashboard-layout {
            padding-top: 120px;
            padding-bottom: 60px;
        }
        .dashboard-panel {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 32px;
            box-shadow: var(--shadow-sm);
        }
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 16px;
        }
        .panel-header h3 {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: -1px;
            color: var(--text-main);
        }
        .table-responsive {
            width: 100%;
            overflow-x: auto;
        }
        .premium-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }
        .premium-table th {
            padding: 16px 20px;
            background: var(--bg-deep);
            color: var(--text-dim);
            font-weight: 700;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border);
        }
        .premium-table td {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
            font-weight: 500;
            color: var(--text-main);
        }
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(8px);
            z-index: 999;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal-content {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            padding: 36px;
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 560px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
        }
        .btn-action-outline {
            border: 1px solid var(--border);
            padding: 8px 14px;
            border-radius: var(--radius);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            background: transparent;
            color: var(--text-main);
            transition: all 0.2s ease;
        }
        .btn-action-outline:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        .btn-action-danger {
            border: 1px solid rgba(244, 67, 54, 0.15);
            background: rgba(244, 67, 54, 0.08);
            color: #f44336;
            padding: 8px 14px;
            border-radius: var(--radius);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-action-danger:hover {
            background: #f44336;
            color: white;
        }
    </style>
</head>
<body>

<header class="global-nav"></header>

<div class="container dashboard-layout">
    <div class="dashboard-panel animate-in">
        <div class="panel-header">
            <h3>Manage Workshops & Trainings</h3>
            <a href="dashboard.html" class="btn btn-glass" style="font-size: 13px; padding: 10px 16px;">
                <i class="fas fa-arrow-left" style="margin-right: 6px;"></i> Dashboard
            </a>
        </div>

        <div id="alert-box"></div>

        <div class="table-responsive">
            <table class="premium-table">
                <thead>
                    <tr>
                        <th>Workshop Title</th>
                        <th>Duration</th>
                        <th>Price</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="trainings-table">
                    <tr>
                        <td colspan="5" style="text-align: center; padding: 40px; color: var(--text-dim);">
                            <i class="fas fa-spinner fa-spin" style="font-size: 24px; color: var(--primary);"></i>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Edit Modal -->
<div id="edit-modal" class="modal-overlay">
    <div class="modal-content animate-in">
        <h3 style="font-size: 22px; font-weight: 900; letter-spacing: -0.5px; color: var(--text-main); margin-bottom: 24px;">Edit Workshop Detail</h3>
        <div id="modal-alert"></div>
        <input type="hidden" id="edit-id">
        
        <div class="input-group">
            <label for="edit-title">Workshop Title</label>
            <input type="text" id="edit-title">
        </div>
        <div class="input-group">
            <label for="edit-duration">Duration (e.g. 6 Weeks)</label>
            <input type="text" id="edit-duration">
        </div>
        <div class="input-group">
            <label for="edit-price">Registration Price (e.g. Rs. 5,000)</label>
            <input type="text" id="edit-price">
        </div>
        <div class="input-group">
            <label for="edit-description">Curriculum & Highlights</label>
            <textarea id="edit-description" rows="4"></textarea>
        </div>
        <div class="input-group" style="margin-bottom: 28px;">
            <label for="edit-status">Status</label>
            <select id="edit-status">
                <option value="active">Active</option>
                <option value="closed">Closed</option>
            </select>
        </div>
        
        <div style="display: flex; gap: 12px;">
            <button onclick="submitEdit()" class="btn btn-primary" style="flex: 1; padding: 12px; font-size: 14px;">Save Changes</button>
            <button onclick="closeModal()" class="btn btn-glass" style="flex: 1; padding: 12px; font-size: 14px;">Cancel</button>
        </div>
    </div>
</div>

<footer class="premium-footer" style="padding: 60px 0; border-top: 1px solid var(--border); margin-top: 80px;">
    <div class="container" style="text-align: center; color: var(--text-dim); font-size: 14px; font-weight: 600;">
        <p>&copy; 2026 SmartJob Nepal. All rights reserved.</p>
    </div>
</footer>

<script src="../assets/js/main.js"></script>
<script>
    async function init() {
        await checkAuth('employer');
        loadTrainings();
    }

    async function loadTrainings() {
        const data  = await apiGet('/trainings.php?mine=1');
        const tbody = document.getElementById('trainings-table');
        
        if (!data || !data.success || !Array.isArray(data.data) || !data.data.length) {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding: 40px; color: var(--text-dim); font-weight: 600;">No workshops posted yet. <a href="post-training.html" style="color: var(--primary);">Post one now</a></td></tr>'; 
            return;
        }

        tbody.innerHTML = data.data.map(t => `
        <tr>
            <td style="font-weight: 800; color: var(--text-main);">${escHtml(t.title)}</td>
            <td style="font-weight: 600; color: var(--text-main);">${escHtml(t.duration || 'N/A')}</td>
            <td style="color: var(--primary); font-weight: 700;">${escHtml(t.price || 'Free')}</td>
            <td>
                <span class="badge ${t.status === 'active' ? 'badge-success' : 'badge-error'}">${t.status}</span>
            </td>
            <td style="display: flex; gap: 8px;">
                <button class="btn-action-outline" onclick="openEdit(${JSON.stringify(t).split('"').join('&quot;')})">Edit</button>
                <button class="btn-action-danger" onclick="removeTraining(${t.id})">Delete</button>
            </td>
        </tr>`).join('');
    }

    function openEdit(t) {
        document.getElementById('edit-id').value          = t.id;
        document.getElementById('edit-title').value       = t.title;
        document.getElementById('edit-duration').value    = t.duration || '';
        document.getElementById('edit-price').value       = t.price    || '';
        document.getElementById('edit-description').value = t.description || '';
        document.getElementById('edit-status').value      = t.status   || 'active';
        document.getElementById('edit-modal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('edit-modal').style.display = 'none';
        document.getElementById('modal-alert').innerHTML    = '';
    }

    async function submitEdit() {
        const id  = document.getElementById('edit-id').value;
        const res = await apiPut(`/trainings.php?id=${id}`, {
            title:       document.getElementById('edit-title').value,
            duration:    document.getElementById('edit-duration').value,
            price:       document.getElementById('edit-price').value,
            description: document.getElementById('edit-description').value,
            status:      document.getElementById('edit-status').value,
        });
        if (res.success) { 
            closeModal(); 
            showAlert('alert-box', 'Workshop details updated successfully!', 'success'); 
            loadTrainings(); 
        } else {
            document.getElementById('modal-alert').innerHTML = `<div class="alert error" style="margin-bottom: 20px;">${res.error || 'Update failed.'}</div>`;
        }
    }

    async function removeTraining(id) {
        if (!confirm('Are you sure you want to delete this training program? All registrations will be removed.')) return;
        const res = await apiDelete(`/trainings.php?id=${id}`);
        if (res.success) { 
            showAlert('alert-box', 'Workshop deleted successfully.', 'success'); 
            loadTrainings(); 
        } else {
            showAlert('alert-box', res.error || 'Delete failed.', 'error');
        }
    }

    init();
</script>
</body>
</html>
