<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post Vacancy v2 - JSTACK</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body { background: #f0f2f5; font-family: 'Inter', sans-serif; }
    .form-wrapper { max-width: 800px; margin: 40px auto; }
    .card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); }
    .card h1 { color: #1a56c4; margin-bottom: 30px; border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; font-weight: 800; display: flex; align-items: center; gap: 15px; }
    .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-bottom: 25px; }
    .input-group label { display: block; margin-bottom: 10px; font-weight: 700; color: #333; font-size: 14px; }
    .input-group select, .input-group input, .input-group textarea { width: 100%; padding: 14px; border: 2px solid #eee; border-radius: 10px; font-size: 15px; transition: 0.3s; box-sizing: border-box; }
    .input-group select:focus, .input-group input:focus, .input-group textarea:focus { border-color: #1a56c4; outline: none; box-shadow: 0 0 0 4px rgba(26, 86, 196, 0.1); }
    .btn-submit { background: #1a56c4; color: white; border: none; padding: 18px; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; width: 100%; transition: 0.3s; margin-top: 20px; }
    .btn-submit:hover { background: #111; transform: translateY(-3px); }
  </style>
</head>
<body>

<header class="navbar" style="background: #1a56c4; color: white; display: flex; justify-content: space-between; align-items: center; padding: 15px 40px; border-bottom: none;">
  <h2 onclick="location.href='../'"><i class="fas fa-cube"></i> JSTACK</h2>
  <a href="dashboard.html" style="color: white; text-decoration: none; font-size: 14px; font-weight: 600;"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
</header>

<div class="form-wrapper">
  <div class="card">
    <h1><i class="fas fa-plus-circle"></i> Advanced Vacancy Posting</h1>
    <div id="alert-box"></div>

    <div class="input-group" style="margin-bottom: 25px;">
      <label>Job Title</label>
      <input type="text" id="title" placeholder="e.g. Senior Fullstack Developer" required>
    </div>

    <div class="input-row">
      <div class="input-group">
        <label>Company Name</label>
        <input type="text" id="company" placeholder="Enter company name" required>
      </div>
      <div class="input-group">
        <label>Industry Category</label>
        <select id="industry">
          <option value="IT">IT & Software</option>
          <option value="Marketing">Marketing & Sales</option>
          <option value="Design">UI/UX Design</option>
          <option value="Finance">Finance & Banking</option>
          <option value="Healthcare">Healthcare</option>
          <option value="Education">Education</option>
        </select>
      </div>
    </div>

    <div class="input-row">
      <div class="input-group">
        <label>Job Type</label>
        <select id="type">
          <option value="full-time">Full-time</option>
          <option value="part-time">Part-time</option>
          <option value="contract">Contract</option>
          <option value="freelance">Freelance</option>
          <option value="internship">Internship</option>
        </select>
      </div>
      <div class="input-group">
        <label>Workplace Setting</label>
        <select id="workplace">
          <option value="Remote">Remote (100% WFH)</option>
          <option value="On-site">On-site (Office)</option>
          <option value="Hybrid">Hybrid (Flexible)</option>
        </select>
      </div>
    </div>

    <div class="input-row">
      <div class="input-group">
        <label>Expected Salary ($)</label>
        <select id="salary">
          <option value="">Negotiable / Not Specified</option>
          <option value="0-500">$0 - $500</option>
          <option value="500-1000">$500 - $1,000</option>
          <option value="1000-2000">$1,000 - $2,000</option>
          <option value="2000-5000">$2,000 - $5,000</option>
          <option value="5000+">$5,000+</option>
        </select>
      </div>
      <div class="input-group">
        <label>Experience Level Required</label>
        <select id="experience_level">
          <option value="entry">Entry Level (No Exp)</option>
          <option value="junior">Junior (1-3 yrs)</option>
          <option value="mid">Mid-Level (3-5 yrs)</option>
          <option value="senior">Senior (5-10 yrs)</option>
          <option value="expert">Expert (10+ yrs)</option>
        </select>
      </div>
    </div>

    <div class="input-row">
      <div class="input-group">
        <label>Primary Location</label>
        <select id="location">
          <option value="Remote">Remote</option>
          <option value="Kathmandu">Kathmandu</option>
          <option value="Pokhara">Pokhara</option>
          <option value="Dhaka">Dhaka</option>
          <option value="Butwal">Butwal</option>
          <option value="Other">Other Global Location</option>
        </select>
      </div>
      <div class="input-group">
        <label>Application Deadline</label>
        <input type="date" id="deadline">
      </div>
    </div>

    <div class="input-group">
      <label>Full Job Description</label>
      <textarea id="description" rows="6" placeholder="Describe the role, responsibilities, and benefits in detail..." required></textarea>
    </div>

    <button id="submit-btn" class="btn-submit" onclick="handlePost()">🚀 Publish Vacancy v2</button>
  </div>
  
  <p style="text-align:center; color:#999; margin-top:20px; font-size:12px;">App Version: 2.0.1 • All changes are synchronized with database.</p>
</div>

<script src="../assets/js/main.js"></script>
<script>
  let currentUser = null;

  async function init() {
    currentUser = await checkAuth('employer');
    
    // Default deadline: 30 days from now
    const d = new Date();
    d.setDate(d.getDate() + 30);
    document.getElementById('deadline').value = d.toISOString().split('T')[0];
  }

  async function handlePost() {
    const formData = {
      title: document.getElementById('title').value.trim(),
      company: document.getElementById('company').value.trim(),
      industry: document.getElementById('industry').value,
      type: document.getElementById('type').value,
      workplace: document.getElementById('workplace').value,
      salary: document.getElementById('salary').value,
      experience_level: document.getElementById('experience_level').value,
      deadline: document.getElementById('deadline').value,
      location: document.getElementById('location').value,
      description: document.getElementById('description').value.trim(),
      employer_id: currentUser.id
    };

    if (!formData.title || !formData.company || !formData.description) {
      return showAlert('alert-box', 'Job Title, Company, and Description are required!', 'error');
    }

    setLoading('submit-btn', true, 'Publishing Opportunity...');
    const res = await apiPost('/jobs.php', formData);
    setLoading('submit-btn', false);

    if (res.success) {
      showAlert('alert-box', 'Vacancy published successfully!', 'success');
      setTimeout(() => location.href = 'dashboard.html', 1500);
    } else {
      showAlert('alert-box', res.error || 'Server error occurred.', 'error');
    }
  }

  init();
</script>
</body>
</html>
