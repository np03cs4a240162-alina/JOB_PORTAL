<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account Settings - JSTACK</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body { background: #f4f7fa; }
    .settings-container { max-width: 600px; margin: 80px auto; padding: 20px; }
    .settings-card { background: white; border-radius: 12px; padding: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    .settings-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
    .settings-header h2 { margin: 0; font-size: 20px; color: #1a56c4; }
    .back-link { text-decoration: none; color: #666; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 5px; }
    .back-link:hover { color: #1a56c4; }
  </style>
</head>
<body>

<header class="navbar">
  <h2 onclick="location.href='../'"><i class="fas fa-cube"></i> JSTACK</h2>
  <div id="nav-user-info" style="font-size: 14px; display: flex; align-items: center; gap: 15px;">
    <span id="display-name">Loading...</span>
    <a href="#" onclick="logout()" style="color: white; opacity: 0.8;"><i class="fas fa-sign-out-alt"></i></a>
  </div>
</header>

<div class="settings-container">
  <div class="settings-card">
    <div class="settings-header">
      <h2><i class="fas fa-user-cog"></i> Account Settings</h2>
      <a href="javascript:history.back()" class="back-link"><i class="fas fa-arrow-left"></i> Back</a>
    </div>

    <div id="alert-box"></div>

    <div class="input-group">
      <label>Full Name</label>
      <input type="text" id="acc-name" placeholder="Your Name">
    </div>
    <div class="input-group">
      <label>Email Address</label>
      <input type="email" id="acc-email" placeholder="email@example.com">
    </div>

    <div style="margin-top: 25px; display: flex; gap: 15px;">
      <button onclick="handleUpdate()" style="flex: 1;">Update Account</button>
      <button onclick="window.location.href='change-password.html'" class="btn-outline" style="flex: 1;">Change Password</button>
    </div>
  </div>
</div>

<script src="../assets/js/main.js"></script>
<script>
  let currentUser = null;

  async function init() {
    currentUser = await checkAuth(); // Allow any logged in user
    if(!currentUser) return;

    document.getElementById('display-name').textContent = currentUser.name;
    document.getElementById('acc-name').value = currentUser.name;
    document.getElementById('acc-email').value = currentUser.email;
  }

  async function handleUpdate() {
    const name = document.getElementById('acc-name').value.trim();
    const email = document.getElementById('acc-email').value.trim();

    if(!name || !email) return showAlert('alert-box', 'Name and email are required.', 'error');

    const res = await apiPatch('/profiles.php', {
      name: name,
      email: email
    });

    if(res.success) {
      showAlert('alert-box', 'Account updated successfully!', 'success');
      document.getElementById('display-name').textContent = name;
      // Update global state if available
      if(window.state && window.state.user) {
          window.state.user.name = name;
          window.state.user.email = email;
      }
    } else {
      showAlert('alert-box', res.error || 'Update failed.', 'error');
    }
  }

  init();
</script>
</body>
</html>
