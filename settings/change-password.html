<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Change Password - JSTACK</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body { background: #f4f7fa; }
    .settings-container { max-width: 500px; margin: 80px auto; padding: 20px; }
    .settings-card { background: white; border-radius: 12px; padding: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    .settings-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
    .settings-header h2 { margin: 0; font-size: 19px; color: #1a56c4; }
    .back-link { text-decoration: none; color: #666; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 5px; }
    .back-link:hover { color: #1a56c4; }
  </style>
</head>
<body>

<header class="navbar">
  <h2 onclick="location.href='../'"><i class="fas fa-cube"></i> JSTACK</h2>
  <div style="font-size: 14px; display: flex; align-items: center; gap: 15px;">
    <a href="#" onclick="logout()" style="color: white; opacity: 0.8;"><i class="fas fa-sign-out-alt"></i></a>
  </div>
</header>

<div class="settings-container">
  <div class="settings-card">
    <div class="settings-header">
      <h2><i class="fas fa-lock"></i> Change Password</h2>
      <a href="account.html" class="back-link"><i class="fas fa-arrow-left"></i> Back</a>
    </div>

    <div id="alert-box"></div>
    <div class="input-group"><label>Current Password</label><input type="password" id="current" placeholder="Current password"></div>
    <div class="input-group"><label>New Password</label><input type="password" id="newpass" placeholder="At least 6 characters"></div>
    <div class="input-group"><label>Confirm New Password</label><input type="password" id="confirm" placeholder="Repeat new password"></div>
    
    <button id="change-btn" onclick="handleChange()" style="width:100%; margin-top:15px;">Change Password</button>
  </div>
</div>

<script src="../assets/js/main.js"></script>
<script>
  async function init() { await requireLogin(); }

  async function handleChange() {
    // clearAlert('alert-box');
    const newpass = document.getElementById('newpass').value;
    const confirm = document.getElementById('confirm').value;
    if (newpass !== confirm) { showAlert('alert-box', 'New passwords do not match.', 'error'); return; }
    setLoading('change-btn', true, 'Updating...');
    const res = await apiPost('/password.php?action=change', {
      current_password: document.getElementById('current').value,
      new_password:     newpass,
      confirm_password: confirm,
    });
    setLoading('change-btn', false);
    showAlert('alert-box', res.success ? 'Password changed successfully!' : (res.error||'Failed.'), res.success?'success':'error');
    if (res.success) document.querySelectorAll('input').forEach(i => i.value = '');
  }

  init();
</script>
</body>
</html>
