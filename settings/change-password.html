<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Update your account password securely.">
    <title>Change Password | SmartJob Nepal</title>
    <link class="stylesheet" rel="stylesheet" href="../assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <style>
        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }
        .settings-layout {
            padding-top: 120px;
            padding-bottom: 60px;
        }
        .settings-panel {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 32px;
            box-shadow: var(--shadow-sm);
        }
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 16px;
        }
        .panel-header h3 {
            font-size: 20px;
            font-weight: 850;
            letter-spacing: -0.5px;
            color: var(--text-main);
        }
    </style>
</head>
<body>

<header class="global-nav"></header>

<div class="container settings-layout" style="max-width: 500px;">
    <div class="settings-panel animate-in">
        <div class="panel-header">
            <h3>Change Password</h3>
            <a href="account.html" class="btn btn-glass" style="font-size: 13px; padding: 10px 16px;">
                <i class="fas fa-arrow-left" style="margin-right: 6px;"></i> Back
            </a>
        </div>

        <div id="alert-box"></div>

        <div class="input-group">
            <label for="current">Current Password</label>
            <input type="password" id="current" placeholder="Enter current password">
        </div>
        <div class="input-group">
            <label for="newpass">New Password</label>
            <input type="password" id="newpass" placeholder="Min 6 characters">
        </div>
        <div class="input-group">
            <label for="confirm">Confirm New Password</label>
            <input type="password" id="confirm" placeholder="Repeat new password">
        </div>
        
        <button id="change-btn" onclick="handleChange()" class="btn btn-primary" style="width: 100%; padding: 14px; font-size: 14px; margin-top: 16px;">
            Update Account Password <i class="fas fa-key" style="margin-left: 8px;"></i>
        </button>
    </div>
</div>

<footer class="premium-footer" style="padding: 60px 0; border-top: 1px solid var(--border); margin-top: 80px;">
    <div class="container" style="text-align: center; color: var(--text-dim); font-size: 14px; font-weight: 600;">
        <p>&copy; 2026 SmartJob Nepal. All rights reserved.</p>
    </div>
</footer>

<script src="../assets/js/main.js"></script>
<script>
    async function init() {
        await requireLogin();
    }

    async function handleChange() {
        const newpass = document.getElementById('newpass').value;
        const confirm = document.getElementById('confirm').value;
        if (newpass !== confirm) { 
            showAlert('alert-box', 'New passwords do not match.', 'error'); 
            return; 
        }

        setLoading('change-btn', true, 'Updating...');
        const res = await apiPost('/password.php?action=change', {
            current_password: document.getElementById('current').value,
            new_password:     newpass,
            confirm_password: confirm,
        });
        setLoading('change-btn', false);
        showAlert('alert-box', res.success ? 'Password changed successfully!' : (res.error||'Failed.'), res.success?'success':'error');
        if (res.success) document.querySelectorAll('input').forEach(i => i.value = '');
    }

    init();
</script>
</body>
</html>
