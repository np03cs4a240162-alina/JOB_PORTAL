<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Detail - JSTACK</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

<header class="navbar">
  <h2>JSTACK</h2>
  <a href="listing.html">← All Jobs</a>
  <div id="nav-actions"></div>
</header>

<div class="container" style="max-width:800px;">
  <div id="job-detail" style="background:white;padding:30px;border-radius:12px;
       box-shadow:0 4px 12px rgba(0,0,0,.08);margin-top:20px;">
    <p style="text-align:center;color:#888;">Loading job...</p>
  </div>
  <div id="alert-box" style="margin-top:16px;"></div>
</div>

<footer><p>© 2026 JSTACK</p></footer>

<script src="../assets/js/main.js"></script>
<script src="../assets/js/jobs.js"></script>
<script>
  const jobId = new URLSearchParams(location.search).get('id');

  async function loadDetail() {
    // Explicitly wait for state to ensure escHtml and other helpers are ready if needed
    // though they are sync, it's good practice.
    await getCurrentUser();
    
    const box  = document.getElementById('job-detail');
    if (!jobId) { box.innerHTML = '<p style="padding:40px; text-align:center; color:#999;">No job ID provided.</p>'; return; }

    const response = await apiGet(`/jobs.php?id=${jobId}`);
    if (!response || !response.success || !response.data) { 
        box.innerHTML = '<p style="padding:40px; text-align:center; color:#999;">Job not found.</p>'; return; 
    }

    const job = response.data;
    const user = window.state.user;
    const isClosed = job.status === 'closed';

    box.innerHTML = `
      <div style="display:flex; justify-content:space-between; align-items:flex-start;">
        <div>
          <h2 style="color:#1a56c4; margin:0; font-size:28px;">${escHtml(job.title)}</h2>
          <p style="margin:10px 0; font-size:18px; color:#555; font-weight:500;">
            ${escHtml(job.employer_name || job.company)}
          </p>
        </div>
        <div id="save-btn-container"></div>
      </div>

      <div style="display:flex; gap:20px; flex-wrap:wrap; margin:25px 0; padding:20px; background:#f8f9fc; border-radius:12px; border: 1px solid #eef2f7;">
        <div style="display:flex; align-items:center; gap:8px;"><i class="fas fa-map-marker-alt" style="color:#1a56c4;"></i> <span>${escHtml(job.location||'Remote')}</span></div>
        <div style="display:flex; align-items:center; gap:8px;"><i class="fas fa-wallet" style="color:#28a745;"></i> <span>${escHtml(job.salary||'Negotiable')}</span></div>
        <div style="display:flex; align-items:center; gap:8px;"><i class="fas fa-briefcase" style="color:#f39c12;"></i> <span style="text-transform: capitalize;">${escHtml(job.type||'Full Time')} • ${escHtml(job.workplace||'On-site')}</span></div>
        <div style="display:flex; align-items:center; gap:8px;"><i class="fas fa-graduation-cap" style="color:#34495e;"></i> <span style="text-transform: capitalize;">${escHtml(job.experience_level||'Entry')} Level</span></div>
        <span class="badge ${isClosed?'badge-error':'badge-success'}" style="margin-left:auto;">${isClosed?'CLOSED':'ACTIVE'}</span>
      </div>

      <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px;">
        <div style="padding:15px; background:#fff; border:1px solid #f0f0f0; border-radius:8px;">
          <small style="color:#999; display:block; margin-bottom:5px;">Industry</small>
          <strong>${escHtml(job.industry || job.category || 'General')}</strong>
        </div>
        <div style="padding:15px; background:#fff; border:1px solid #f0f0f0; border-radius:8px;">
          <small style="color:#999; display:block; margin-bottom:5px;">Application Deadline</small>
          <strong style="color:${new Date(job.deadline) < new Date() ? '#e53e3e' : '#333'}">
            ${job.deadline ? new Date(job.deadline).toLocaleDateString(undefined, {month:'long', day:'numeric', year:'numeric'}) : 'No Deadline'}
          </strong>
        </div>
      </div>

      <div style="margin:30px 0;">
        <h4 style="margin-bottom:15px; font-size:18px; color:#333;">Job Description</h4>
        <div style="line-height:1.8; color:#444; white-space: pre-line;">${escHtml(job.description||'')}</div>
      </div>

      <p style="margin-top:30px; font-size:13px; color:#aaa; border-top:1px solid #eee; padding-top:15px;">
        <i class="far fa-clock"></i> Posted on: ${new Date(job.created_at).toLocaleDateString(undefined, {month:'long', day:'numeric', year:'numeric'})}
      </p>

      <div id="action-area" style="margin-top:30px; display:flex; gap:15px; flex-wrap:wrap;"></div>
    `;

    renderActions(user, job, isClosed);
  }

  function renderActions(user, job, isClosed) {
    const area = document.getElementById('action-area');
    const saveContainer = document.getElementById('save-btn-container');
    
    if (!user) {
      area.innerHTML = `<button onclick="location.href='../auth/login.html'" style="width:200px;">Login to Apply</button>`;
    } else if (user.role === 'seeker' && !isClosed) {
      area.innerHTML = `
        <button onclick="location.href='${BASE}/seeker/application.html?id=${job.id}'" style="padding:12px 40px; font-size:16px;">
          ✅ Apply for this position
        </button>`;
      
      saveContainer.innerHTML = `
        <button class="btn-outline" onclick="saveThisJob(${job.id})" style="border-radius:30px; padding:8px 20px;">
          <i class="far fa-bookmark"></i> Save Job
        </button>`;
    } else if (isClosed) {
      area.innerHTML = `<div style="background:#fff5f5; color:#c53030; padding:15px 25px; border-radius:8px; border:1px solid #feb2b2; width:100%; font-weight:600;">This job is no longer accepting applications.</div>`;
    }
  }

  async function saveThisJob(id) {
    // Ensure toggleSaveJob exists (it should, from jobs.js)
    if (typeof toggleSaveJob !== 'function') {
        console.error('toggleSaveJob not defined! Check jobs.js loading.');
        showAlert('alert-box', 'Error: Save function not loaded. Please refresh.', 'error');
        return;
    }
    
    const res = await toggleSaveJob(id, false);
    if (res && (res.success || res.status === 409)) {
      showAlert('alert-box', 'Job saved successfully!', 'success');
    } else {
      showAlert('alert-box', (res && res.error) || 'Could not save job.', 'error');
    }
  }

  loadDetail();
</script>
</body>
</html>
