<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Access your corporate conversation pipelines and candidate inquiries.">
    <title>Message Center | SmartJob Nepal</title>
    <link class="stylesheet" rel="stylesheet" href="../assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <style>
        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }
        .inbox-layout {
            padding-top: 120px;
            padding-bottom: 60px;
        }
        .inbox-panel {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 32px;
            box-shadow: var(--shadow-sm);
        }
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 16px;
        }
        .panel-header h3 {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: -1px;
            color: var(--text-main);
        }
        .convo-item {
            background: var(--bg-deep);
            border: 1px solid var(--border);
            padding: 20px 24px;
            border-radius: var(--radius-lg);
            margin-bottom: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .convo-item:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

<header class="global-nav"></header>

<div class="container inbox-layout" style="max-width: 720px;">
    <div class="inbox-panel animate-in">
        <div class="panel-header">
            <h3>Conversations</h3>
            <a href="../index.html" class="btn btn-glass" style="font-size: 13px; padding: 10px 16px;">
                <i class="fas fa-home" style="margin-right: 6px;"></i> Home
            </a>
        </div>

        <div style="display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap;">
            <div style="flex: 1; display: flex; align-items: center; background: var(--bg-deep); border: 1px solid var(--border); border-radius: var(--radius); padding: 0 16px;">
                <i class="fas fa-search" style="color: var(--text-dim);"></i>
                <input type="text" id="search-input" placeholder="Search messages or people..." style="width: 100%; border: none; background: transparent; padding: 12px; color: var(--text-main); outline: none;">
            </div>
            <div style="display: flex; gap: 8px; align-items: center; background: var(--bg-deep); border: 1px solid var(--border); border-radius: var(--radius); padding: 4px;">
                <button id="btn-inbox" onclick="setFolder('inbox')" class="btn btn-primary" style="padding: 8px 16px; font-size: 13px; border-radius: 6px;">Inbox</button>
                <button id="btn-archive" onclick="setFolder('archive')" class="btn btn-glass" style="padding: 8px 16px; font-size: 13px; border-radius: 6px;">Archived</button>
            </div>
        </div>

        <div id="conversations-list">
            <div style="text-align: center; padding: 40px;">
                <i class="fas fa-spinner fa-spin" style="font-size: 28px; color: var(--primary);"></i>
                <p style="margin-top: 10px; font-weight: 600; color: var(--text-muted);">Fetching inbox...</p>
            </div>
        </div>
    </div>
</div>

<footer class="premium-footer" style="padding: 60px 0; border-top: 1px solid var(--border); margin-top: 80px;">
    <div class="container" style="text-align: center; color: var(--text-dim); font-size: 14px; font-weight: 600;">
        <p>&copy; 2026 SmartJob Nepal. All rights reserved.</p>
    </div>
</footer>

<script src="../assets/js/main.js"></script>
<script>
    let currentFolder = 'inbox';
    let searchQuery = '';
    let searchTimeout;

    function setFolder(f) {
        currentFolder = f;
        document.getElementById('btn-inbox').className = f === 'inbox' ? 'btn btn-primary' : 'btn btn-glass';
        document.getElementById('btn-archive').className = f === 'archive' ? 'btn btn-primary' : 'btn btn-glass';
        loadConversations();
    }

    async function loadConversations() {
        const list = document.getElementById('conversations-list');
        const data = await apiGet(`/messages.php?folder=${currentFolder}&search=${encodeURIComponent(searchQuery)}`);
        
        if (!data || !Array.isArray(data) || !data.length) {
            list.innerHTML = `
                <div style="text-align: center; padding: 60px; color: var(--text-dim);">
                    <div style="font-size: 48px; color: var(--border); margin-bottom: 16px;"><i class="far fa-comments"></i></div>
                    <div style="font-size: 16px; font-weight: 800; color: var(--text-main);">No conversations found</div>
                    <p style="font-size: 14px; font-weight: 500; margin-top: 6px;">${searchQuery ? 'Try a different search term.' : 'Say hello or message seekers from vacancies panels!'}</p>
                </div>`;
        } else {
            list.innerHTML = data.map(c => `
                <div class="convo-item" onclick="location.href='chat.html?with=${c.partner.id}'" style="display: flex; align-items: center; gap: 16px;">
                    <div style="position:relative; width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, var(--primary) 0%, #ff5722 100%); color: white; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 800; flex-shrink: 0; box-shadow: 0 4px 10px rgba(244, 124, 72, 0.2);">
                        ${c.partner.name.charAt(0).toUpperCase()}
                        ${c.unread_count > 0 ? `<div style="position:absolute; top:-2px; right:-2px; width:12px; height:12px; background:#ef4444; border-radius:50%; border:2px solid var(--bg-surface);"></div>` : ''}
                    </div>
                    <div style="flex: 1; overflow:hidden;">
                        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 6px;">
                            <strong style="color: ${c.unread_count > 0 ? 'var(--text-main)' : 'var(--text-muted)'}; font-size: 16px; font-weight: 800;">${escHtml(c.partner.name)}</strong>
                            <span class="badge" style="background: rgba(255,255,255,0.05); color: var(--text-dim); border: 1px solid var(--border); font-size: 10px; text-transform: uppercase;">${c.partner.role}</span>
                        </div>
                        ${c.last_message ? `<div style="color: ${c.unread_count > 0 ? 'var(--primary)' : 'var(--text-dim)'}; font-size: 14px; font-weight: ${c.unread_count > 0 ? '600' : '500'}; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">
                            ${c.last_message.is_spam ? '<span style="color:#ef4444;"><i class="fas fa-shield-alt"></i> Spam Message Filtered</span>' : (c.last_message.file_path ? '<i class="fas fa-paperclip"></i> Attachment' : escHtml(c.last_message.message))}
                        </div>` : `<div style="color: var(--text-dim); font-size: 13px; font-style: italic;">No messages yet.</div>`}
                    </div>
                    <div style="color: var(--primary); font-size: 16px; padding-left: 16px; text-align:center;">
                        ${c.unread_count > 0 ? `<div style="background:#ef4444; color:white; font-size:10px; padding:2px 8px; border-radius:10px; font-weight:800; margin-bottom:4px;">${c.unread_count}</div>` : ''}
                        <i class="fas fa-chevron-right"></i>
                    </div>
                </div>`).join('');
        }
    }

    async function init() {
        const user = await checkAuth();
        if(!user) return;
        
        document.getElementById('search-input').addEventListener('input', (e) => {
            searchQuery = e.target.value.trim();
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(loadConversations, 300);
        });

        loadConversations();
    }
    
    init();
</script>
</body>
</html>
