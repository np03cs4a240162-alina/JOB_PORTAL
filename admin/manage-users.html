<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Secure administrative user account management panel.">
    <title>User Accounts Management | SmartJob Nepal</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <style>
        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }
        .dashboard-layout {
            padding-top: 120px;
            padding-bottom: 60px;
        }
        .dashboard-panel {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 32px;
            box-shadow: var(--shadow-sm);
            margin-bottom: 32px;
        }
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 16px;
        }
        .panel-header h3 {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: -1px;
            color: var(--text-main);
        }
        .table-responsive {
            width: 100%;
            overflow-x: auto;
        }
        .premium-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }
        .premium-table th {
            padding: 16px 20px;
            background: var(--bg-deep);
            color: var(--text-dim);
            font-weight: 700;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border);
        }
        .premium-table td {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
            font-weight: 500;
            color: var(--text-main);
        }
        .search-bar-grid {
            display: grid;
            grid-template-columns: 2fr 1fr auto auto;
            gap: 16px;
            margin-bottom: 32px;
        }
        @media (max-width: 768px) {
            .search-bar-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<header class="global-nav"></header>

<div class="container dashboard-layout">
    <!-- Add User Section -->
    <div class="dashboard-panel animate-in">
        <h3 style="font-size: 20px; font-weight: 850; color: var(--text-main); margin-bottom: 24px; border-bottom: 1px solid var(--border); padding-bottom: 12px;">
            <i class="fas fa-plus-circle" style="color: var(--primary); margin-right: 8px;"></i> Add New User
        </h3>
        <div id="create-alert"></div>
        <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 24px;">
            <div class="input-group" style="margin-bottom: 0;">
                <label for="new-name">Full Name</label>
                <input type="text" id="new-name" placeholder="Full name" required>
            </div>
            <div class="input-group" style="margin-bottom: 0;">
                <label for="new-email">Email Address</label>
                <input type="email" id="new-email" placeholder="email@example.com" required>
            </div>
            <div class="input-group" style="margin-bottom: 0;">
                <label for="new-password">Password</label>
                <input type="password" id="new-password" placeholder="Min 6 chars" required>
            </div>
            <div class="input-group" style="margin-bottom: 0;">
                <label for="new-role">Role</label>
                <select id="new-role">
                    <option value="seeker">Job Seeker</option>
                    <option value="employer">Employer</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
        </div>
        <button onclick="createUser()" class="btn btn-primary" style="padding: 12px 24px; font-size: 14px;">
            Create User Account <i class="fas fa-plus" style="margin-left: 8px;"></i>
        </button>
    </div>

    <!-- Search & Users list -->
    <div class="dashboard-panel animate-in">
        <div class="panel-header">
            <h3>User Management</h3>
            <a href="dashboard.html" class="btn btn-glass" style="font-size: 13px; padding: 10px 16px;">
                <i class="fas fa-arrow-left" style="margin-right: 6px;"></i> Dashboard
            </a>
        </div>

        <div class="search-bar-grid">
            <input type="text" id="search-text" placeholder="Search by candidate or corporate name / email..." oninput="localSearch()">
            <input type="number" id="search-id" placeholder="Find by Account ID...">
            <button onclick="searchById()" class="btn btn-primary" style="padding: 10px 20px;">Find Account</button>
            <button onclick="loadUsers()" class="btn btn-glass" style="padding: 10px 20px;">Reset</button>
        </div>

        <div id="table-alert"></div>

        <div class="table-responsive">
            <table class="premium-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name / Email</th>
                        <th>Role</th>
                        <th>Joined On</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="users-table">
                    <tr>
                        <td colspan="5" style="text-align: center; padding: 40px; color: var(--text-dim);">
                            <i class="fas fa-spinner fa-spin" style="font-size: 24px; color: var(--primary);"></i>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<footer class="premium-footer" style="padding: 60px 0; border-top: 1px solid var(--border); margin-top: 80px;">
    <div class="container" style="text-align: center; color: var(--text-dim); font-size: 14px; font-weight: 600;">
        <p>&copy; 2026 SmartJob Nepal. All rights reserved.</p>
    </div>
</footer>

<script src="../assets/js/main.js"></script>
<script>
    let allUsers = [];
    const roleClass = { admin:'badge-error', employer:'badge-success', seeker:'badge-info' };

    async function init() {
        await checkAuth('admin');
        loadUsers();
    }

    async function loadUsers() {
        document.getElementById('search-text').value = '';
        document.getElementById('search-id').value   = '';
        const data = await apiGet('/users.php');
        allUsers = Array.isArray(data) ? data : [];
        renderTable(allUsers);
    }

    function localSearch() {
        const q = document.getElementById('search-text').value.toLowerCase();
        renderTable(allUsers.filter(u => u.name.toLowerCase().includes(q) || u.email.toLowerCase().includes(q)));
    }

    async function searchById() {
        const id = document.getElementById('search-id').value.trim();
        if (!id) return;
        const u = await apiGet(`/users.php?id=${id}`);
        renderTable(u && !u.error ? [u] : []);
    }

    function renderTable(data) {
        const tbody = document.getElementById('users-table');
        if (!data.length) { 
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding: 40px; color: var(--text-dim); font-weight: 600;">No users found.</td></tr>'; 
            return; 
        }
        tbody.innerHTML = data.map(u => `
        <tr>
            <td style="font-weight: 800; color: var(--text-main);">#${u.id}</td>
            <td>
                <strong style="color: var(--text-main); font-size: 15px;">${escHtml(u.name)}</strong><br>
                <small style="color: var(--text-muted); font-weight: 500;">${escHtml(u.email)}</small>
            </td>
            <td><span class="badge ${roleClass[u.role] || 'badge-info'}">${u.role.toUpperCase()}</span></td>
            <td style="color: var(--text-dim); font-size: 13px;">${new Date(u.created_at).toLocaleDateString()}</td>
            <td style="display:flex; gap: 8px;">
                <button class="btn btn-glass" onclick="editUser(${u.id},'${escHtml(u.name)}')" style="padding: 6px 12px; font-size: 12px;">Edit</button>
                ${u.role !== 'admin' ? `<button class="btn btn-glass" onclick="deleteUser(${u.id})" style="padding: 6px 12px; font-size: 12px; border-color: rgba(244,67,54,0.3); color: #f44336;">Delete</button>` : ''}
            </td>
        </tr>`).join('');
    }

    async function createUser() {
        const data = {
            name:     document.getElementById('new-name').value.trim(),
            email:    document.getElementById('new-email').value.trim(),
            password: document.getElementById('new-password').value,
            role:     document.getElementById('new-role').value,
        };
        if (!data.name || !data.email || !data.password) {
            showAlert('create-alert', 'All fields are required.', 'error'); 
            return;
        }
        const res = await apiPost('/users.php', data);
        if (res.success) {
            showAlert('create-alert', 'User created successfully!', 'success');
            ['new-name','new-email','new-password'].forEach(id => document.getElementById(id).value = '');
            loadUsers();
        } else {
            showAlert('create-alert', res.error || 'Failed to create user.', 'error');
        }
    }

    async function editUser(id, name) {
        const newName = prompt('Enter new name for ' + name, name);
        if (!newName) return;
        const res = await apiPut(`/users.php?id=${id}`, { name: newName });
        if (res.success) loadUsers();
        else alert(res.error || 'Update failed.');
    }

    async function deleteUser(id) {
        if (!confirm('Delete this user and all their data?')) return;
        const res = await apiDelete(`/users.php?id=${id}`);
        if (res.success) { 
            showAlert('table-alert', 'User deleted successfully.', 'success'); 
            loadUsers(); 
        } else {
            showAlert('table-alert', res.error || 'Delete failed.', 'error');
        }
    }

    init();
</script>
</body>
</html>
