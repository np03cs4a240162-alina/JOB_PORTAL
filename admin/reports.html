<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Secure administrative analytics and system performance reports.">
    <title>System Performance Reports | SmartJob Nepal</title>
    <link class="stylesheet" rel="stylesheet" href="../assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }
        .dashboard-layout {
            padding-top: 120px;
            padding-bottom: 60px;
        }
        .dashboard-panel {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 32px;
            box-shadow: var(--shadow-sm);
            margin-bottom: 32px;
        }
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 16px;
        }
        .panel-header h3 {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: -1px;
            color: var(--text-main);
        }
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 20px;
            text-align: center;
            box-shadow: var(--shadow-sm);
        }
        .table-responsive {
            width: 100%;
            overflow-x: auto;
        }
        .premium-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }
        .premium-table th {
            padding: 16px 20px;
            background: var(--bg-deep);
            color: var(--text-dim);
            font-weight: 700;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border);
        }
        .premium-table td {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
            font-weight: 500;
            color: var(--text-main);
        }
    </style>
</head>
<body>

<header class="global-nav"></header>

<div class="container dashboard-layout">
    <div class="dashboard-panel animate-in">
        <div class="panel-header">
            <h3>System Performance Overview</h3>
            <div style="display: flex; gap: 12px; align-items: center;">
                <button class="btn btn-glass" onclick="window.print()" style="font-size: 13px; padding: 10px 16px;">
                    <i class="fas fa-print" style="margin-right: 6px;"></i> Print Report
                </button>
                <a href="dashboard.html" class="btn btn-glass" style="font-size: 13px; padding: 10px 16px;">
                    <i class="fas fa-arrow-left" style="margin-right: 6px;"></i> Dashboard
                </a>
            </div>
        </div>

        <p id="report-date" style="color: var(--text-muted); font-size: 13px; font-weight: 600; margin-bottom: 32px;"></p>

        <div class="stat-grid">
            <div class="stat-card">
                <p id="t-jobs" style="font-size: 28px; font-weight: 900; color: var(--primary); line-height: 1; margin-bottom: 8px;">--</p>
                <p style="font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;">Jobs Posted</p>
            </div>
            <div class="stat-card">
                <p id="t-users" style="font-size: 28px; font-weight: 900; color: var(--primary); line-height: 1; margin-bottom: 8px;">--</p>
                <p style="font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;">Users</p>
            </div>
            <div class="stat-card">
                <p id="t-apps" style="font-size: 28px; font-weight: 900; color: var(--primary); line-height: 1; margin-bottom: 8px;">--</p>
                <p style="font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;">Applications</p>
            </div>
            <div class="stat-card">
                <p id="t-employers" style="font-size: 28px; font-weight: 900; color: var(--primary); line-height: 1; margin-bottom: 8px;">--</p>
                <p style="font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;">Employers</p>
            </div>
            <div class="stat-card">
                <p id="t-seekers" style="font-size: 28px; font-weight: 900; color: var(--primary); line-height: 1; margin-bottom: 8px;">--</p>
                <p style="font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;">Seekers</p>
            </div>
            <div class="stat-card">
                <p id="t-accepted" style="font-size: 28px; font-weight: 900; color: #10b981; line-height: 1; margin-bottom: 8px;">--</p>
                <p style="font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;">Accepted</p>
            </div>
        </div>

        <div style="background: var(--bg-deep); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 32px; margin-bottom: 40px;">
            <h3 style="font-size: 18px; font-weight: 800; color: var(--text-main); margin-bottom: 24px;">Top Rated Corporate Partners</h3>
            <div style="height: 350px; position: relative;">
                <canvas id="companyChart"></canvas>
            </div>
        </div>

        <div class="table-responsive">
            <table class="premium-table">
                <thead>
                    <tr>
                        <th>Category</th>
                        <th>Count</th>
                        <th>Status</th>
                        <th>Performance</th>
                    </tr>
                </thead>
                <tbody id="report-table">
                    <tr>
                        <td colspan="4" style="text-align: center; padding: 40px; color: var(--text-dim);">
                            <i class="fas fa-spinner fa-spin" style="font-size: 24px; color: var(--primary);"></i>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<footer class="premium-footer" style="padding: 60px 0; border-top: 1px solid var(--border); margin-top: 80px;">
    <div class="container" style="text-align: center; color: var(--text-dim); font-size: 14px; font-weight: 600;">
        <p>&copy; 2026 SmartJob Nepal. All rights reserved.</p>
    </div>
</footer>

<script src="../assets/js/main.js"></script>
<script>
    async function init() {
        await checkAuth('admin');
        document.getElementById('report-date').textContent = 'Report Generation Date: ' + new Date().toLocaleString();
        
        const res = await apiGet('/dashboard-stats.php');
        if (!res.success) return;
        
        const s = res.stats;
        document.getElementById('t-jobs').textContent      = s.total_jobs;
        document.getElementById('t-users').textContent     = s.total_users;
        document.getElementById('t-apps').textContent      = s.total_applications;
        document.getElementById('t-employers').textContent = s.total_employers;
        document.getElementById('t-seekers').textContent   = s.total_seekers;
        document.getElementById('t-accepted').textContent  = s.accepted_applications;
        
        const rate = s.total_applications > 0 ? ((s.accepted_applications/s.total_applications)*100).toFixed(1) : '0.0';
        document.getElementById('report-table').innerHTML = `
        <tr>
            <td style="font-weight: 800; color: var(--text-main);">User Base Metrics</td>
            <td style="font-weight: 600; color: var(--text-main);">${s.total_users} active accounts</td>
            <td><span class="badge badge-success">STABLE</span></td>
            <td style="font-weight: 600; color: var(--text-muted);">Healthy growth</td>
        </tr>
        <tr>
            <td style="font-weight: 800; color: var(--text-main);">Job Listings Vault</td>
            <td style="font-weight: 600; color: var(--text-main);">${s.total_jobs} total openings</td>
            <td><span class="badge badge-success">ACTIVE</span></td>
            <td style="font-weight: 600; color: var(--text-muted);">${s.active_jobs} live openings</td>
        </tr>
        <tr>
            <td style="font-weight: 800; color: var(--text-main);">Application Funnel</td>
            <td style="font-weight: 600; color: var(--text-main);">${s.total_applications} total submissions</td>
            <td><span class="badge badge-warning">PROCESSING</span></td>
            <td style="font-weight: 600; color: var(--text-muted);">${s.pending_applications} pending audit</td>
        </tr>
        <tr>
            <td style="font-weight: 800; color: var(--text-main);">Funnel Conversion Rate</td>
            <td style="font-weight: 600; color: var(--text-main);">${rate}% interview conversion</td>
            <td><span class="badge ${parseFloat(rate) >= 15 ? 'badge-success' : 'badge-warning'}">${parseFloat(rate) >= 15 ? 'EXCELLENT' : 'OPTIMIZING'}</span></td>
            <td style="font-weight: 600; color: var(--text-muted);">${parseFloat(rate) >= 15 ? 'Exceeding target' : 'Funnel optimization in progress'}</td>
        </tr>`;

        if (res.company_stats && res.company_stats.length > 0) {
            renderCompanyChart(res.company_stats);
        }
    }

    function renderCompanyChart(data) {
        const ctx = document.getElementById('companyChart').getContext('2d');
        const isDark = document.body.classList.contains('dark-theme') || (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
        const textColor = isDark ? '#f8fafc' : '#0f172a';
        const gridColor = isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.06)';

        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: data.map(item => item.company),
                datasets: [{
                    label: 'Corporate Rating Score (1-5 Scale)',
                    data: data.map(item => item.avg_rating),
                    backgroundColor: '#f47c48',
                    borderColor: '#f47c48',
                    borderWidth: 1,
                    borderRadius: 8
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false }
                },
                scales: {
                    x: {
                        ticks: { color: textColor }
                    },
                    y: {
                        beginAtZero: true,
                        max: 5,
                        ticks: { 
                            stepSize: 1,
                            color: textColor
                        },
                        grid: {
                            color: gridColor
                        }
                    }
                }
            }
        });
    }

    init();
</script>
</body>
</html>
