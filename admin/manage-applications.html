<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Secure administrative pipelines audit board.">
    <title>All System Applications | SmartJob Nepal</title>
    <link class="stylesheet" rel="stylesheet" href="../assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <style>
        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }
        .dashboard-layout {
            padding-top: 120px;
            padding-bottom: 60px;
        }
        .dashboard-panel {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 32px;
            box-shadow: var(--shadow-sm);
        }
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 16px;
        }
        .panel-header h3 {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: -1px;
            color: var(--text-main);
        }
        .table-responsive {
            width: 100%;
            overflow-x: auto;
        }
        .premium-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }
        .premium-table th {
            padding: 16px 20px;
            background: var(--bg-deep);
            color: var(--text-dim);
            font-weight: 700;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border);
        }
        .premium-table td {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
            font-weight: 500;
            color: var(--text-main);
        }
        .search-bar-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 32px;
        }
        .filter-tabs {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .filter-tab {
            padding: 10px 24px;
            border-radius: 100px;
            border: 1px solid var(--border);
            background: var(--bg-surface);
            color: var(--text-dim);
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 8px;
            user-select: none;
        }
        .filter-tab:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: rgba(244, 124, 72, 0.04);
        }
        .filter-tab.active {
            background: var(--primary-gradient, var(--primary));
            border-color: transparent;
            color: white !important;
            box-shadow: 0 4px 12px rgba(244, 124, 72, 0.25);
        }
        .filter-tab-count {
            font-size: 11px;
            font-weight: 800;
            padding: 2px 8px;
            border-radius: 100px;
            transition: all 0.2s ease;
        }
        .filter-tab.active .filter-tab-count {
            background: rgba(255, 255, 255, 0.25);
            color: white;
        }
        .filter-tab:not(.active) .filter-tab-count {
            background: var(--bg-deep);
            color: var(--text-muted);
        }
    </style>
</head>
<body>

<header class="global-nav"></header>

<div class="container dashboard-layout">
    <div class="dashboard-panel animate-in">
        <div class="panel-header">
            <h3>All Candidate Applications</h3>
            <a href="dashboard.html" class="btn btn-glass" style="font-size: 13px; padding: 10px 16px;">
                <i class="fas fa-arrow-left" style="margin-right: 6px;"></i> Dashboard
            </a>
        </div>

        <div class="search-bar-grid">
            <div class="filter-tabs" id="status-tabs">
                <!-- Status filter tabs will be injected here dynamically -->
            </div>
            <div style="position: relative; width: 100%;">
                <i class="fas fa-search" style="position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: var(--text-dim); font-size: 14px;"></i>
                <input type="text" id="filter-search" placeholder="Search applicant names, emails, or vacancy titles..." oninput="filterApps()" style="width: 100%; padding: 14px 20px 14px 48px; border-radius: 100px; border: 1px solid var(--border); background: var(--bg-deep); color: var(--text-main); font-size: 14px; font-weight: 600; outline: none; transition: all 0.2s;" onfocus="this.style.borderColor='var(--primary)'" onblur="this.style.borderColor='var(--border)'">
            </div>
        </div>

        <div id="alert-box"></div>

        <div class="table-responsive">
            <table class="premium-table">
                <thead>
                    <tr>
                        <th>Applicant</th>
                        <th>Email</th>
                        <th>Job</th>
                        <th>Employer</th>
                        <th>Date</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="apps-table">
                    <tr>
                        <td colspan="7" style="text-align: center; padding: 40px; color: var(--text-dim);">
                            <i class="fas fa-spinner fa-spin" style="font-size: 24px; color: var(--primary);"></i>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<footer class="premium-footer" style="padding: 60px 0; border-top: 1px solid var(--border); margin-top: 80px;">
    <div class="container" style="text-align: center; color: var(--text-dim); font-size: 14px; font-weight: 600;">
        <p>&copy; 2026 SmartJob Nepal. All rights reserved.</p>
    </div>
</footer>

<script src="../assets/js/main.js"></script>
<script>
    let allApps = [];
    let currentTabStatus = ''; // Default is 'All'

    async function init() {
        await checkAuth('admin');
        const data = await apiGet('/applications.php?admin_view=1');
        allApps = Array.isArray(data.data) ? data.data : (Array.isArray(data) ? data : []);
        renderTabs();
        filterApps();
    }

    function renderTabs() {
        const counts = {
            all: allApps.length,
            pending: allApps.filter(a => a.status === 'pending').length,
            accepted: allApps.filter(a => a.status === 'accepted').length,
            rejected: allApps.filter(a => a.status === 'rejected').length
        };
        const tabs = [
            { id: '', label: 'All', count: counts.all, icon: 'fa-list' },
            { id: 'pending', label: 'Pending', count: counts.pending, icon: 'fa-clock' },
            { id: 'accepted', label: 'Accepted', count: counts.accepted, icon: 'fa-circle-check' },
            { id: 'rejected', label: 'Rejected', count: counts.rejected, icon: 'fa-circle-xmark' }
        ];
        const container = document.getElementById('status-tabs');
        container.innerHTML = tabs.map(t => `
            <button class="filter-tab ${currentTabStatus === t.id ? 'active' : ''}" onclick="selectTab('${t.id}')">
                <i class="fa-solid ${t.icon}"></i>
                <span>${t.label}</span>
                <span class="filter-tab-count">${t.count}</span>
            </button>
        `).join('');
    }

    function selectTab(status) {
        currentTabStatus = status;
        renderTabs();
        filterApps();
    }

    function filterApps() {
        const q = document.getElementById('filter-search').value.toLowerCase();
        const filtered = allApps.filter(a => {
            const matchStatus = !currentTabStatus || a.status === currentTabStatus;
            const matchSearch = 
                (a.seeker_name || '').toLowerCase().includes(q) ||
                (a.seeker_email || '').toLowerCase().includes(q) ||
                (a.job_title || '').toLowerCase().includes(q) ||
                (a.employer_name || '').toLowerCase().includes(q);
            return matchStatus && matchSearch;
        });
        renderTable(filtered);
    }

    function renderTable(apps) {
        const tbody = document.getElementById('apps-table');
        if (!apps.length) { 
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding: 40px; color: var(--text-dim); font-weight: 600;">No applications found.</td></tr>'; 
            return; 
        }
        tbody.innerHTML = apps.map(a => `
        <tr class="animate-in" style="animation-duration: 0.2s;">
            <td style="font-weight: 800; color: var(--text-main); font-size: 15px;">${escHtml(a.seeker_name)}</td>
            <td style="color: var(--text-muted); font-weight: 600;">${escHtml(a.seeker_email || 'N/A')}</td>
            <td style="color: var(--primary); font-weight: 700;">${escHtml(a.job_title)}</td>
            <td style="color: var(--text-main); font-weight: 600;">${escHtml(a.employer_name || 'N/A')}</td>
            <td style="color: var(--text-dim); font-size: 13px;">${new Date(a.applied_at).toLocaleDateString()}</td>
            <td>
                <span class="badge ${a.status === 'accepted' ? 'badge-success' : (a.status === 'rejected' ? 'badge-error' : 'badge-warning')}">${a.status.toUpperCase()}</span>
            </td>
            <td>
                <select onchange="updateStatus(${a.id}, this.value)" style="padding: 6px 12px; border-radius: var(--radius); border: 1px solid var(--border); font-size: 13px; font-weight: 600; background: var(--bg-surface); color: var(--text-main); cursor: pointer; outline: none; transition: 0.2s;">
                    <option value="pending"  ${a.status==='pending'  ?'selected':''}>Pending</option>
                    <option value="accepted" ${a.status==='accepted' ?'selected':''}>Accept</option>
                    <option value="rejected" ${a.status==='rejected' ?'selected':''}>Reject</option>
                </select>
            </td>
        </tr>`).join('');
    }

    async function updateStatus(id, status) {
        const res = await apiPost('/applications.php?action=update-status', { id: id, status: status });
        if (res.success) { 
            showAlert('alert-box', `Application marked as ${status.toUpperCase()} successfully!`, 'success'); 
            init(); 
        } else {
            showAlert('alert-box', res.error || 'Update failed.', 'error');
        }
    }

    init();
</script>
</body>
</html>
