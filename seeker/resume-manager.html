<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Manage and upload your candidate resume files.">
    <title>Resume Hub | SmartJob Nepal</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <style>
        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }
        .dashboard-layout {
            padding-top: 120px;
            padding-bottom: 60px;
        }
        .dashboard-panel {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 32px;
            box-shadow: var(--shadow-sm);
        }
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 16px;
        }
        .panel-header h3 {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: -1px;
            color: var(--text-main);
        }
        .upload-dashed {
            background: var(--bg-deep);
            padding: 40px 20px;
            border-radius: var(--radius-lg);
            border: 2px dashed var(--border);
            text-align: center;
            margin-bottom: 32px;
            transition: all 0.2s ease;
        }
        .upload-dashed:hover {
            border-color: var(--primary);
        }
        .resume-card {
            padding: 20px;
            background: var(--bg-deep);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s ease;
        }
        .resume-card:hover {
            border-color: var(--primary);
        }
        .resume-card:last-child {
            margin-bottom: 0;
        }
        .btn-action {
            background: rgba(244, 124, 72, 0.08);
            color: var(--primary);
            border: 1px solid rgba(244, 124, 72, 0.15);
            padding: 8px 12px;
            border-radius: var(--radius);
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .btn-action:hover {
            background: var(--primary);
            color: white;
        }
        .btn-delete {
            background: rgba(244, 67, 54, 0.08);
            color: #f44336;
            border: 1px solid rgba(244, 67, 54, 0.15);
            padding: 8px 12px;
            border-radius: var(--radius);
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .btn-delete:hover {
            background: #f44336;
            color: white;
        }
    </style>
</head>
<body>

<header class="global-nav"></header>

<div class="container dashboard-layout" style="max-width: 680px;">
    <div class="dashboard-panel animate-in">
        <div class="panel-header">
            <h3><i class="fas fa-file-pdf" style="color: var(--primary); margin-right: 10px;"></i> Resume Hub</h3>
            <a href="dashboard.html" class="btn btn-glass" style="font-size: 13px; padding: 10px 16px;">
                <i class="fas fa-arrow-left" style="margin-right: 6px;"></i> Dashboard
            </a>
        </div>

        <div id="alert-box"></div>

        <div class="upload-dashed">
            <div style="font-size: 40px; color: var(--text-dim); margin-bottom: 16px;"><i class="fas fa-cloud-arrow-up"></i></div>
            <label style="display: block; margin-bottom: 16px; font-weight: 700; color: var(--text-main); font-size: 15px;">
                Upload New Resume (PDF, DOC, DOCX — max 5MB)
            </label>
            <input type="file" id="resume-file" accept=".pdf,.doc,.docx" style="display: block; margin: 0 auto 20px; font-size: 14px;">
            <button id="upload-btn" onclick="handleUpload()" class="btn btn-primary" style="width: 100%; padding: 14px; font-size: 14px;">
                <i class="fas fa-upload" style="margin-right: 8px;"></i> Upload Resume
            </button>
        </div>

        <h4 style="font-size: 16px; font-weight: 800; color: var(--text-main); margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 12px;">
            Your Uploaded Resume Vault
        </h4>
        <div id="resume-list">
            <div style="text-align: center; padding: 40px;">
                <i class="fas fa-spinner fa-spin" style="font-size: 24px; color: var(--primary);"></i>
            </div>
        </div>
    </div>
</div>

<footer class="premium-footer" style="padding: 60px 0; border-top: 1px solid var(--border); margin-top: 80px;">
    <div class="container" style="text-align: center; color: var(--text-dim); font-size: 14px; font-weight: 600;">
        <p>&copy; 2026 SmartJob Nepal. All rights reserved.</p>
    </div>
</footer>

<script src="../assets/js/main.js"></script>
<script>
    async function init() {
        const user = await checkAuth('seeker');
        if (!user) return;
        loadResumes();
    }

    async function loadResumes() {
        const res = await apiGet('/upload.php');
        const list = document.getElementById('resume-list');
        
        if (!res.success || !res.data || res.data.length === 0) {
            list.innerHTML = `
            <div style="text-align:center; padding: 40px 20px; background: var(--bg-deep); border-radius: var(--radius); border: 1px solid var(--border);">
                <i class="fas fa-file-circle-xmark" style="font-size: 36px; display:block; margin-bottom:12px; color: var(--border);"></i>
                <div style="font-weight: 700; color: var(--text-muted); font-size: 14px;">No resumes uploaded yet.</div>
            </div>`; 
            return;
        }

        list.innerHTML = res.data.map(r => `
        <div class="resume-card animate-in">
            <div style="display:flex; align-items:center; gap: 16px;">
                <i class="fas fa-file-pdf" style="color: var(--primary); font-size:24px;"></i>
                <div>
                    <div style="font-weight: 800; font-size:14px; color: var(--text-main); margin-bottom: 4px;">${escHtml(r.filename)}</div>
                    <small style="color: var(--text-muted); font-weight: 500;">Uploaded on ${new Date(r.uploaded_at).toLocaleDateString()}</small>
                </div>
            </div>
            <div style="display:flex; gap: 10px;">
                <a href="${API}/../uploads/resumes/${r.filename}" target="_blank" class="btn-action">
                    <i class="fas fa-arrow-down-to-bracket"></i>
                </a>
                <button class="btn-delete" onclick="deleteResume(${r.id})">
                    <i class="far fa-trash-can"></i>
                </button>
            </div>
        </div>`).join('');
    }

    async function handleUpload() {
        const fileInput = document.getElementById('resume-file');
        const file = fileInput.files[0];
        
        if (!file) { 
            showAlert('alert-box', 'Please select a file to upload.', 'error'); 
            return; 
        }

        if (file.size > 5 * 1024 * 1024) {
            showAlert('alert-box', 'File is too large. Max size is 5MB.', 'error');
            return;
        }

        setLoading('upload-btn', true, 'Uploading...');
        
        const form = new FormData();
        form.append('resume', file);

        try {
            const response = await fetch(API + '/upload.php', { 
                method: 'POST', 
                credentials: 'include', 
                body: form 
            });
            const res = await response.json();
            
            setLoading('upload-btn', false);

            if (res.success) {
                showAlert('alert-box', 'Resume uploaded successfully!', 'success');
                fileInput.value = '';
                loadResumes();
            } else {
                showAlert('alert-box', res.error || 'Upload failed.', 'error');
            }
        } catch (err) {
            setLoading('upload-btn', false);
            showAlert('alert-box', 'Connection error. Please try again.', 'error');
        }
    }

    async function deleteResume(id) {
        if (!confirm('Are you sure you want to delete this resume?')) return;
        
        const res = await apiDelete(`/upload.php?id=${id}`);
        if (res.success) {
            showAlert('alert-box', 'Resume deleted.', 'success');
            loadResumes();
        } else {
            showAlert('alert-box', res.error || 'Delete failed.', 'error');
        }
    }

    init();
</script>
</body>
</html>
