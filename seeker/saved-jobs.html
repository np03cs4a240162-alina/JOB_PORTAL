<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="View and manage your saved job postings.">
    <title>Saved Jobs | SmartJob Nepal</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <style>
        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }
        .dashboard-layout {
            padding-top: 120px;
            padding-bottom: 60px;
        }
        .page-header {
            margin-bottom: 36px;
        }
        .saved-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }
        .saved-card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 28px;
            box-shadow: var(--shadow-sm);
            transition: all 0.2s ease;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 200px;
        }
        .saved-card:hover {
            transform: translateY(-4px);
            border-color: var(--primary);
            box-shadow: var(--shadow-md);
        }
        .saved-card h3 {
            font-size: 18px;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }
        .saved-card .company {
            color: var(--primary);
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 16px;
        }
        .saved-card .meta {
            display: flex;
            gap: 16px;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 24px;
        }
        .saved-card .actions {
            display: flex;
            gap: 12px;
            border-top: 1px solid var(--border);
            padding-top: 16px;
        }
        .btn-remove {
            background: rgba(244, 67, 54, 0.08) !important;
            color: #f44336 !important;
            border: 1px solid rgba(244, 67, 54, 0.15) !important;
            padding: 10px 14px;
            border-radius: var(--radius);
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-remove:hover {
            background: #f44336 !important;
            color: white !important;
        }
    </style>
</head>
<body>

<header class="global-nav"></header>

<div class="container dashboard-layout">
    <div class="page-header">
        <h2 style="font-size: 32px; font-weight: 900; letter-spacing: -1.5px; color: var(--text-main);"><i class="fas fa-bookmark" style="color: var(--primary); margin-right: 12px;"></i> Saved Pipelines</h2>
        <p style="color: var(--text-muted); font-size: 15px; font-weight: 500; margin-top: 6px;">Manage and monitor your bookmarked positions.</p>
    </div>

    <div id="alert-box"></div>

    <div id="saved-list" class="saved-grid">
        <div style="grid-column: 1/-1; text-align: center; padding: 100px;">
            <i class="fas fa-spinner fa-spin" style="font-size: 30px; color: var(--primary);"></i>
            <p style="margin-top: 15px; color: var(--text-muted); font-weight: 600;">Fetching your saved jobs...</p>
        </div>
    </div>
</div>

<footer class="premium-footer" style="padding: 60px 0; border-top: 1px solid var(--border); margin-top: 80px;">
    <div class="container" style="text-align: center; color: var(--text-dim); font-size: 14px; font-weight: 600;">
        <p>&copy; 2026 SmartJob Nepal. All rights reserved.</p>
    </div>
</footer>

<script src="../assets/js/main.js"></script>
<script src="../assets/js/jobs.js"></script>
<script>
    async function init() {
        await checkAuth('seeker');
        const data = await apiGet('/saved.php');
        const list = document.getElementById('saved-list');
        
        if (!Array.isArray(data) || !data.length) {
            list.innerHTML = `
            <div style="grid-column: 1/-1; text-align: center; padding: 80px 20px; background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-lg);">
                <i class="far fa-bookmark" style="font-size: 60px; color: var(--border); margin-bottom: 20px; display: block;"></i>
                <h3 style="color: var(--text-main); font-size: 18px; font-weight: 800; margin-bottom: 6px;">No saved jobs yet</h3>
                <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 24px; font-weight: 500;">Jobs you save will appear here for fast pipeline matching.</p>
                <a href="../jobs/listing.html" class="btn btn-primary" style="font-size: 13px; padding: 10px 20px;">Browse Jobs</a>
            </div>`;
            return;
        }

        list.innerHTML = data.map(job => `
        <div class="saved-card animate-in" id="card-${job.id}">
            <div>
                <h3>${escHtml(job.title)}</h3>
                <p class="company">${escHtml(job.company)}</p>
                <div class="meta">
                    <span><i class="fas fa-map-marker-alt" style="margin-right: 6px;"></i> ${escHtml(job.location || 'Remote')}</span>
                    <span><i class="fas fa-wallet" style="margin-right: 6px;"></i> ${escHtml(job.salary || 'Negotiable')}</span>
                </div>
            </div>
            <div class="actions">
                <button onclick="location.href='../jobs/detail.html?id=${job.id}'" class="btn btn-glass" style="flex: 1; font-size: 13px; padding: 10px;">View Details</button>
                <button class="btn-remove" onclick="unsave(${job.id})"><i class="far fa-trash-can"></i></button>
            </div>
        </div>`).join('');
    }

    async function unsave(jobId) {
        if(!confirm('Remove this job from your saved list?')) return;
        
        const res = await apiDelete(`/saved.php?job_id=${jobId}`);
        if (res.success) {
            const card = document.getElementById(`card-${jobId}`);
            card.style.opacity = '0.3';
            card.style.transform = 'scale(0.95)';
            setTimeout(() => init(), 300);
        } else {
            showAlert('alert-box', res.error || 'Failed to remove job.', 'error');
        }
    }

    init();
</script>
</body>
</html>
