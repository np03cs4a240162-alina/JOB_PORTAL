<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seeker Dashboard - JSTACK</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body { background: #f0f2f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    
    /* Top Blue Navbar */
    .top-blue-nav { background: #1a56c4; height: 50px; width: 100%; position: fixed; top: 0; left: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; align-items: center; padding: 0 40px; justify-content: space-between; }
    .top-blue-nav h2 { color: white; margin: 0; font-size: 20px; display: flex; align-items: center; gap: 8px;}
    .top-blue-nav a { color: white; text-decoration: none; font-size: 14px; font-weight: 500; }
    
    /* Layout Container */
    .dashboard-layout { max-width: 1200px; margin: 80px auto 40px; display: flex; gap: 30px; padding: 0 20px; align-items: flex-start; }
    
    /* Left Profile Card */
    .profile-card-left { width: 300px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow: hidden; flex-shrink: 0; text-align: center; }
    .profile-card-top { background: #1a56c4; height: 100px; width: 100%; position: relative; }
    .profile-avatar { width: 80px; height: 80px; border-radius: 50%; background: #e8f0fe; border: 4px solid white; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: bold; color: #1a56c4; position: absolute; bottom: -40px; left: 50%; transform: translateX(-50%); }
    .profile-avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
    .profile-info { padding: 50px 20px 20px; border-bottom: 1px solid #f1f1f1; }
    .profile-info h3 { margin: 0 0 5px 0; color: #333; font-size: 18px; }
    .profile-info p { margin: 0 0 20px 0; color: #888; font-size: 13px; }
    .btn-update-profile { display: block; width: 100%; padding: 10px; border: 1.5px solid #1a56c4; color: #1a56c4; background: transparent; border-radius: 6px; font-weight: 600; cursor: pointer; transition: 0.2s; text-decoration: none;}
    .btn-update-profile:hover { background: #f0f7ff; }
    
    .profile-stats { padding: 20px; }
    .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; font-size: 14px; color: #555; }
    .stat-row strong { color: #1a56c4; font-size: 15px; }

    /* Right Main Area */
    .main-area { flex: 1; min-width: 0; }
    
    /* Quick Actions */
    .quick-actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
    .action-card { background: white; border-radius: 12px; padding: 25px 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; cursor: pointer; transition: 0.2s; text-decoration: none; display: block; color: #333; }
    .action-card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,0.08); }
    .action-card i { font-size: 28px; margin-bottom: 15px; color: #888; }
    .action-card h4 { margin: 0; font-size: 15px; font-weight: 600; }
    
    /* Content Boxes */
    .content-box { background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); padding: 25px; margin-bottom: 30px; }
    .box-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f1f1f1; padding-bottom: 15px; margin-bottom: 20px; }
    .box-header h3 { margin: 0; color: #1a56c4; font-size: 18px; font-weight: 700; }
    .box-header a { color: #1a56c4; font-size: 13px; font-weight: 600; text-decoration: none; }
    
    /* List Items */
    .list-item { border: 1px solid #f1f1f1; border-radius: 8px; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; transition: 0.2s; cursor: pointer; text-decoration: none; color: inherit; display: flex;}
    .list-item:hover { border-color: #1a56c4; background: #fafcff; }
    .list-item:last-child { margin-bottom: 0; }
    .item-info h4 { margin: 0 0 5px 0; color: #1a56c4; font-size: 16px; }
    .item-info p { margin: 0; color: #888; font-size: 12px; }
    
    .status-pill { padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
    .status-rejected { background: #feebeb; color: #d32f2f; }
    .status-accepted { background: #e8f5e9; color: #2e7d32; }
    .status-pending { background: #fff3cd; color: #856404; }
    
    .arrow-icon { color: #1a56c4; opacity: 0.7; }
  </style>
</head>
<body>

<header class="top-blue-nav">
  <h2><i class="fas fa-cube"></i> JSTACK</h2>
  <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
</header>

<div class="dashboard-layout">
  
  <!-- LEFT PROFILE CARD -->
  <aside class="profile-card-left">
    <div class="profile-card-top">
      <div class="profile-avatar" id="avatar-container">
        <!-- Initials fallback or Image -->
        <span id="avatar-initial">D</span>
      </div>
    </div>
    <div class="profile-info">
      <h3 id="profile-name">Loading...</h3>
      <p id="profile-email">applicant@example.com</p>
      <a href="profile.html" class="btn-update-profile">Update Profile</a>
    </div>
    <div class="profile-stats">
      <div class="stat-row">
        <span>Applied Jobs</span>
        <strong id="stat-applied">0</strong>
      </div>
      <div class="stat-row">
        <span>Saved Jobs</span>
        <strong id="stat-saved">0</strong>
      </div>
    </div>
  </aside>

  <!-- RIGHT MAIN AREA -->
  <main class="main-area">
    
    <!-- Quick Actions -->
    <div class="quick-actions">
      <a href="../jobs/search.html" class="action-card">
        <i class="fas fa-search" style="color: #4fc3f7;"></i>
        <h4>Search Jobs</h4>
      </a>
      <a href="resume-manager.html" class="action-card">
        <i class="far fa-file-alt" style="color: #ce93d8;"></i>
        <h4>My Resumes</h4>
      </a>
      <a href="../settings/account.html" class="action-card">
        <i class="fas fa-cog" style="color: #b0bec5;"></i>
        <h4>Settings</h4>
      </a>
    </div>

    <!-- Recent Applications -->
    <div class="content-box">
      <div class="box-header">
        <h3>Recent Applications</h3>
        <a href="applied-jobs.html">View All</a>
      </div>
      <div id="recent-apps-container">
        <p style="text-align: center; color: #999; padding: 20px;">Loading applications...</p>
      </div>
    </div>

    <!-- Recommended For You -->
    <div class="content-box">
      <div class="box-header">
        <h3>Recommended for You</h3>
      </div>
      <div id="recommended-container">
        <p style="text-align: center; color: #999; padding: 20px;">Loading applications...</p>
      </div>
    </div>
    
  </main>
</div>

<script src="../assets/js/main.js"></script>
<script>
  async function init() {
    const user = await checkAuth('seeker');
    if (!user) return;
    
    // Set Profile Data
    document.getElementById('profile-name').textContent = user.name;
    document.getElementById('profile-email').textContent = user.email || 'user@example.com';
    document.getElementById('avatar-initial').textContent = user.name.charAt(0).toUpperCase();
    
    // Fetch user profile for photo
    const pRes = await apiGet('/profiles.php');
    if (pRes && pRes.success && pRes.data && pRes.data.photo) {
        document.getElementById('avatar-container').innerHTML = `<img src="../uploads/images/${pRes.data.photo}" alt="Profile" onerror="this.onerror=null; this.outerHTML='<span id=\\'avatar-initial\\'>${user.name.charAt(0).toUpperCase()}</span>';">`;
    }

    // Fetch Stats
    const statsRes = await apiGet('/dashboard-stats.php');
    if (statsRes && statsRes.success) {
      document.getElementById('stat-applied').textContent = statsRes.stats.total_applications || 0;
      document.getElementById('stat-saved').textContent = statsRes.stats.saved_jobs || 0;
    }
    
    // Fetch Recent Applications
    const appsRes = await apiGet('/applications.php');
    const appsContainer = document.getElementById('recent-apps-container');
    if (appsRes && appsRes.success && appsRes.data.length > 0) {
        const recentApps = appsRes.data.slice(0, 3);
        appsContainer.innerHTML = recentApps.map(app => {
            let statusClass = 'status-pending';
            if(app.status === 'rejected') statusClass = 'status-rejected';
            if(app.status === 'accepted') statusClass = 'status-accepted';
            
            return `
            <a href="applied-jobs.html" class="list-item">
                <div class="item-info">
                    <h4>${escHtml(app.job_title)}</h4>
                    <p>${escHtml(app.company || 'Company')} • Applied on ${new Date(app.created_at).toLocaleDateString()}</p>
                </div>
                <span class="status-pill ${statusClass}">${escHtml(app.status)}</span>
            </a>
            `;
        }).join('');
    } else {
        appsContainer.innerHTML = '<p style="text-align:center; color:#999; padding:20px;">No recent applications.</p>';
    }
    
    // Fetch Recommended Jobs
    const jobsRes = await apiGet('/jobs.php');
    if (jobsRes && jobsRes.success && jobsRes.data.length > 0) {
        document.getElementById('recommended-container').innerHTML = jobsRes.data.slice(0, 5).map(job => `
            <a href="../jobs/detail.html?id=${job.id}" class="list-item">
                <div class="item-info">
                    <h4 style="color: #333;">${escHtml(job.title)}</h4>
                    <p>${escHtml(job.company)} • ${escHtml(job.location || 'Remote')} • ${escHtml(job.salary || 'Negotiable')}</p>
                </div>
                <i class="fas fa-arrow-right arrow-icon"></i>
            </a>
        `).join('');
    } else {
        document.getElementById('recommended-container').innerHTML = '<p style="text-align:center; color:#999; padding:20px;">No jobs available at the moment.</p>';
    }
  }
  
  init();
</script>
</body>
</html>
